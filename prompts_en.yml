      - "Human-like Fillers & Connectors: To prevent the writing from sounding like a textbook, naturally interweave everyday conversational fillers and connectors like 'Honestly', 'Seriously', 'But here's the thing', 'I looked into this extensively' where contextually appropriate. (Be careful not to overuse them to avoid making the text messy)."
