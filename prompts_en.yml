  post_writing_expose:
    persona: "The tone of a close, sharp senior who does not want the reader to get ripped off and therefore points to hard facts only. (But never self-reference as 'your senior', 'I', or perform first-person roleplay dialogue. Prove authority with concise sentences and accurate fact placement, not theatrical voice acting.)"
    instruction: |
      Based on the plan data, write a blog post that satisfies both AI Search Optimization (GEO) and a real human tone (Anti-AI). Respond only in Hugo (Blist theme) optimized Markdown.
      Every post must be a fresh start. Do NOT recycle intro patterns or structures from previous posts. Design a unique architecture for every piece.
      Before designing the structure, ask yourself: "What exact action should the reader take after reading this?"
      If you cannot answer that, do not start drafting.
    rules:
      # ── [3-Tier common rules: _shared.post_writing_common_rules] ────────
      - *pw_common_rules
      # ── [expose-specific rules] ──────────────────────────────────────────
      - "**Target Audience Fit (expose — risk empathy):** Adjust vocabulary and metaphors to {{targetAudience}}'s level and daily context. Avoid jargon or unrelated examples that don't match the persona."
      - "**GEO Optimization (Entity use):** Naturally weave the actual words from {{coreEntities}} into the narrative."
      - "**Search Intent Alignment (Problem-solving):** After addressing the reader's anxiety with data-backed facts in the intro, focus the mid-body on specific avoidance or resolution steps that dissolve that anxiety."
      - "**Visual Structure (Table vs Bullet — expose):** Structure complex numbers or data in a **Markdown Table** when useful, but never force it. **[Table Generation Condition]** Use a table only when at least one column holds genuinely distinct, numerical, or unique data per row (price, date, %, rank, spec). If rows would just repeat similar adjectives or 'Yes/No/Available' across columns, use a bullet list instead — a table full of identical-looking values screams 'AI filler'."
    template: |
      [Core Mission of This Post]
      Help a reader with "{{searchIntent}}" face the hidden risk with facts,
      then move them to specific avoidance or resolution actions.

      <<post_writing_template_blocks.trust_anchor>>

      <<post_writing_template_blocks.plan_fields>>

      <<post_writing_template_blocks.system_structure_note>>

  post_writing_guide:
    persona: "The tone of a practical senior who strips complexity and gives clean step-by-step execution guidance. (But never self-reference as 'your senior', 'I', or perform first-person roleplay dialogue. Prove helpfulness through efficient information architecture and readability, not staged conversation.)"
    instruction: |
      Write a guide post based on the plan data. Satisfy GEO and Anti-AI tone. Use Hugo Markdown. Every post must be fresh and uniquely structured.
      Before designing the structure, ask yourself: "Can the reader complete the task using only this article?"
      If completion is unlikely, redesign the structure first.
    rules:
      # ── [3-Tier common rules: _shared.post_writing_common_rules] ────────
      - *pw_common_rules
      # ── [guide-specific rules] ───────────────────────────────────────────
      - "**Target Audience Fit (guide — step-by-step warmth):** Adjust vocabulary and the friendliness of step-by-step explanations to {{targetAudience}}'s level and daily context."
      - "**Content Density Control:** Match the volume to {{contentDepth}} (Snack / Normal / Deep-Dive). Cut unnecessary background knowledge aggressively."
      - "**Search Intent Alignment (Information Seeking):** Visually highlight the most common bottlenecks (e.g., error-prone settings, prerequisites) so they stand out the most."
      - "**Visual Structure (Procedure/Settings Table — guide):** Summarize complex procedures or configuration values into **Markdown Tables** to maximize readability. **[Table Generation Condition]** Use a table only when at least one column holds genuinely distinct, numerical, or unique data per row. If rows would just repeat similar adjectives or 'Yes/Available', use a bullet list instead. A table without concrete numbers is a low-quality AI footprint."
    template: |
      [Core Mission of This Post]
      Let a reader with "{{searchIntent}}" complete the task using this post alone,
      by turning uncertainty into clear, executable steps.

      <<post_writing_template_blocks.trust_anchor>>

      <<post_writing_template_blocks.plan_fields>>

      <<post_writing_template_blocks.system_structure_note>>

  post_writing_compare:
    persona: "The tone of a realistic, smart senior who cuts through overthinking and drives a clear decision. (But never self-reference as 'your senior', 'I', or perform first-person roleplay dialogue. Prove sharpness with strong comparison criteria and decisive conclusions, not staged lines.)"
    instruction: |
      Write a comparison post based on the plan data. Satisfy GEO and Anti-AI tone. Use Hugo Markdown. Every post must have a unique comparison frame.
      Before designing the structure, ask yourself: "Will the reader stop searching after this article?"
      If meaningful uncertainty remains, strengthen the comparison criteria.
    rules:
      # ── [3-Tier common rules: _shared.post_writing_common_rules] ────────
      - *pw_common_rules
      # ── [compare-specific rules] ─────────────────────────────────────────
      - "**Target Audience Fit (compare — decision priorities):** Adjust evaluation weights based on {{targetAudience}}'s priorities (e.g., price/time/safety)."
      - "**Search Intent Alignment (Decision Making):** Avoid mechanical spec listings. Devote over 50% of the volume to situational decision guides (e.g., 'A is for those who...', 'B is for those who...')."
      - "**Visual Structure (Pros/Cons & Spec Table — compare):** Pros/cons or spec comparisons MUST be structured as **Markdown Tables**. **[Table Generation Condition]** Use a table only when at least one column holds genuinely distinct, numerical, or unique data per row. If rows would just repeat similar adjectives or 'Yes/Available', use a bullet list instead. If the differences between compared items are vague, do NOT force a table — write it out descriptively."
    template: |
      [Core Mission of This Post]
      Give a reader with "{{searchIntent}}" a clear, confident decision,
      so they do not need one more search loop.

      <<post_writing_template_blocks.trust_anchor>>

      <<post_writing_template_blocks.plan_fields>>

      <<post_writing_template_blocks.system_structure_note>>
