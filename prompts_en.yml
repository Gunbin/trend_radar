            "mainKeyword": "Key keyword",
            "angleType": "expose, guide, or compare (lowercase only)",
            "searchIntent": "The searcher's true intention or hidden anxiety",
            "contentDepth": "Snack / Normal / Deep-Dive",
            "conclusionType": "Q&A / Key Summary / CTA / Thought-Provoking",
            "shoppableKeyword": "If the topic is about a physical, purchasable product, provide the specific product name. If it's a policy, finance, or abstract concept, **use the data type null (without quotes) exactly, not the string 'null'.**",
            "coreFact": "Specific fact/number from the text",
            "viralTitles": {
              "curiosity": "[formula-based title]",
              "dataDriven": "[formula-based title]",
              "solution": "[formula-based title]"
            },
