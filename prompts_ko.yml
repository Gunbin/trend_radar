      # ── [compare 고유 규칙] ────────────────────────────────────────────
      - "**타겟 독자 적합성 (compare — 결정 기준 가중치):** 제공된 {{targetAudience}}의 결정 기준(예: 가성비/시간/안전)에 맞춰 평가 가중치를 조절하세요."
      - "**검색 의도 대응 (구매/결정형):** 기계적인 스펙 나열을 피하고, 상황별 결정 가이드(예: '~한 사람에게는 A, ~한 사람에게는 B')를 분량의 50% 이상 할애하세요."
      - "**시각적 구조화 (장단점·스펙 표 — compare):** 장단점이나 스펙 비교는 반드시 **마크다운 표(Table)**로 구조화하세요. **[표 생성 조건]** 단, 표를 만들 때는 최소 1개 이상의 컬럼이 '모든 행에서 서로 다른 구체 수치·고유값·조건'을 가져야 합니다. 모든 행이 동일 값이거나 '약간/보통' 같은 모호 표현으로 채워질 것 같으면 표 대신 **불릿 리스트**로 대체하세요. 비교 대상들의 차이가 모호하다면 표를 억지로 만들지 말고 서술형으로 풀어주세요."
    template: |
      [포스팅 기획안]
      - 카테고리: {{category}}
