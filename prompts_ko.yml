      [시스템 구조 안내] 제목(H1)은 시스템이 자동 처리하므로 본문에 작성하지 마세요. 
      대신, H2(##) 소제목을 시작하기 전에 반드시 **[도입부 일반 텍스트]**를 먼저 작성해야 합니다. 이 도입부에는 타겟 독자를 사로잡는 '변칙적 훅(Hook)'과 글의 핵심을 찌르는 '2~3문장 요약(BLUF)'을 자연스럽게 녹여내세요. 도입부가 끝난 후부터 H2(##)를 활용해 본격적인 본문을 전개하세요.