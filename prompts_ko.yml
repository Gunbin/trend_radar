      - "GEO 최적화 (엔티티/구조화): {{coreEntities}}를 포함하세요. 장단점이나 스펙 비교는 반드시 **마크다운 표(Table)**로 구조화하세요."
      - "이미지 절대 형식 준수: 제공된 이미지 플레이스홀더({{context_url_1}}, {{context_url_2}}, {{context_url_3}})는 반드시 ![이미지 설명](IMAGE_PLACEHOLDER_N \"english keyword\") 형식으로 본문 문맥에 맞는 위치에 삽입하세요. (N은 1, 2, 3) **플레이스홀더 문자열을 마크다운 없이 그대로 노출하거나 영문 keyword를 빠뜨리는 것은 치명적 오류입니다.**"
      - "H2 소제목: 제공된 {{subTopics}}를 활용하여 명확한 평가가 담긴 문장으로 구성하세요."
      - "GEO 최적화 (결론부 동적 할당 및 디자인): 기획된 {{conclusionType}}에 맞춰 마지막 H2 섹션을 구성하세요. 단순 텍스트 나열을 피하고, 결론부는 반드시 인용구(>) 블록이나 마크다운 리스트, 볼드체를 적극 활용하여 시각적으로 돋보이는 박스 형태의 레이아웃으로 디자인하세요."
      - "Google Search 기반 딥 데이터 매핑: 본문 작성 시 정확한 가격, 날짜, 장소, 통계 수치가 필요하다면 [Google Search]를 적극 활용하여 팩트 체크된 정보를 기재하세요. 막연한 추측성 표현을 지양하고 전문가 수준의 데이터를 확보하세요. 신뢰도를 높이는 공식 출처는 글 하단의 [참고 자료] 섹션에 명확히 밝히세요."
      - "권위 있는 출처 인용 (Reference SEO): 글의 마지막 결론부 직전에, 검색을 통해 확인한 공신력 있는 언론사나 공식 기관의 정보 출처를 '[참고 자료]' 섹션으로 1~2개 포함하세요. (예: \"본 정보는 OOO 공식 배포 자료를 바탕으로 팩트 체크되었습니다.\")"
    template: |
      [포스팅 기획안]
      - 키워드: {{mainKeyword}}
      - 타겟 독자: {{targetAudience}}
      - 볼륨/결론 방향성: {{contentDepth}} / {{conclusionType}}
      - 핵심 팩트: {{coreFact}}
      - 핵심 엔티티: {{coreEntities}}
      - 소주제 방향성: {{subTopics}}
      - 연관 키워드: {{lsiKeywords}}
      - 전달 메시지: {{coreMessage}}
      - 제공 이미지: {{context_url_1}}, {{context_url_2}}, {{context_url_3}}
      - FAQ 데이터: {{faq}}

      인사말 없이 H1을 만들지 말고 H2(##)부터 본문을 바로 시작하세요. (제목은 시스템이 frontmatter로 따로 처리하므로 본문 H1 중복 금지)
