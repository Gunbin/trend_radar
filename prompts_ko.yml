         - **[예외 조항] 단, 원본 키워드 자체가 주는 트래픽 볼륨이나 직관성이 압도적이라고 판단된다면 무리하게 파생형으로 변형하지 말고 원본을 유지하세요.**
      2. 앵글(Angle) 동적 할당: 각 주제의 성격에 맞춰 'expose'(폭로/리스크), 'guide'(절차/방법), 'compare'(비교/선택) 중 가장 찰떡같이 어울리는 것을 영문 소문자로 하나만 선택하세요.
