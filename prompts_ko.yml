            "coreEntities": ["본문에서 반드시 언급되어야 할 고유명사, 전문용어, 또는 공식 기관명 (문맥에 따라 2~6개 유동적으로)"],
            "lsiKeywords": ["연관단어1", "연관단어2", "연관단어3"],
