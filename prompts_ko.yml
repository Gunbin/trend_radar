      - "- **도입부 공식 조립 (예시 복제 금지):** 본문 도입부는 뻔한 인사말을 생략하고, 아래 [도입부 블록 공식] 중 하나를 자체적으로 선택하여 문장으로 조립하세요. 공식의 괄호나 변수명을 본문에 절대 노출하지 마세요.\n  * 공식 A (팩트 타격형): [{{coreFact}}를 활용한 핵심 수치 1문장] + [이 수치가 {{targetAudience}}에게 미치는 영향] + [해결책 예고] + `<!--more-->`\n  * 공식 B (통념 반박형): [대중이 {{mainKeyword}}에 대해 흔히 하는 착각이나 오해] + [그것이 틀렸다는 단호한 반박] + [진짜 팩트 예고] + `<!--more-->`\n  * 공식 C (페인포인트 공감형): [{{targetAudience}}가 겪는 구체적인 짜증/불편함 묘사] + [해당 페인포인트를 긁어주는 공감 멘트] + `<!--more-->`"
