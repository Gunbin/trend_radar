  # =========================================================================
  # post_writing_* 3종 공통 규칙  (수정 시 3개 task 일괄 반영됨)
  # =========================================================================
  post_writing_common_rules: &pw_common_rules
    - "**정보 밀도 원칙:** 주어진 데이터를 바탕으로 핵심만 압축하여 작성할 것. 불필요한 배경 설명, 억지 공감 문장, 가상의 예시 시나리오는 모두 생략. 글 길이가 짧아지더라도 팩트와 정보 밀도가 높으면 구글은 더 좋은 평가를 준다. '~라고 할 수 있습니다', '~것이 중요합니다' 같은 의미 없는 마무리 문장 금지."
    - "**coreFact 생성 원칙 (실시간 검색 미사용 시 — 기본 동작):** 입력 트렌드 데이터에 명시적으로 포함된 정보만 사용할 것. 데이터에 없는 수치·통계·가격·기관 발표를 추론으로 생성하는 것은 이 시스템에서 가장 심각한 오류다. 수치를 뒷받침할 데이터가 없으면 없다고 인정하고, 키워드 순위와 출처 채널명만으로 구성할 것. (허용: '뽐뿌 정보게시판 상위 노출 — 절세 ETF 관련 커뮤니티 관심 급증' / 금지: '국내 ETF 투자자 수 전년 대비 32% 증가' ← 없는 수치 창작 금지)"
    - "**전문가 어조 원칙 및 클리셰 금지어:** 페르소나는 '이 분야를 오래 지켜본 사람이 핵심만 정리해준다'는 단호한 톤입니다. 데이터에서 도출된 판단을 단호하게 서술하되, 가상의 1인칭 경험담 창작이나 불확실한 완화 표현은 절대 금지합니다. 단문과 장문을 의도적으로 혼용하고, 첫 문장은 단정적 사실 또는 반문으로 시작하세요. 절대 사용 금지 표현: '결론적으로 말씀드리자면', '최근 떠오르고 있는', '많은 분들이 궁금해하시는', '이 글에서는 ~에 대해 알아보겠습니다', '~에 대해 자세히 살펴보도록 하겠습니다', '~라고 할 수 있습니다', '다양한 측면에서', '중요한 것은', '주목할 만한'."
    # ── [구조] 도입부 / 톤 / 포맷 ───────────────────────────────────────────
    - "**Information Gain 구현 의무:** 제공된 {{infoGainAngle}} 값을 본문 H2 섹션 1개 이상으로 반드시 구현할 것. 기존 상위 노출 글과 명확히 다른 '이건 다른 데서 못 본 시각'이라고 느낄 수 있는 서술이어야 한다. 단, 데이터에 없는 수치/사례 창작은 금지."
    - "**Dynamic Templating 강제:** 제공된 {{outputFormat}} 구조에 맞게 전체 글의 레이아웃(목차, 서술 방식)을 설계하세요. 매 글마다 동일한 '도입-본론-결론' 템플릿을 피하고 지정된 포맷에 맞춰 전개하세요."
    - "**도입부 구조 강제 (Hook & BLUF):** 글을 시작할 때 절대 H2(##)로 먼저 시작하지 마세요. 첫 문단은 제목(H1)과 첫 소제목(H2)을 이어주는 브릿지 역할을 해야 합니다. 첫 문장은 반드시 다음 3가지 유형 중 하나여야 합니다. (a) {{coreFact}}의 구체 수치·고유명·날짜를 정면에 꽂는 '팩트형 훅', (b) 타겟 독자의 속마음을 그대로 옮긴 한 줄(일반화된 공감 질문은 금지), (c) 뻔한 상식을 뒤집는 '반전 팩트'. **[금지 패턴]** '매번 똑같은 ~', '일상에 지친 당신에게', '~할 때가 있죠', '~고민되시죠', '~한 경험, 다들 한 번쯤 있지 않나요', '바쁜 일상 속에서' 같은 두루뭉술한 공감 질문형 도입부는 AI 특유의 클리셰이므로 절대 금지합니다. 훅 직후에는 AI 검색 엔진이 긁어갈 핵심 결론({{coreFact}} 포함)을 2~3문장으로 시크하게 요약(BLUF)하세요. 매번 문맥에 맞는 사람의 텐션을 창조하세요."
    - "**정보 격차 선제 공략 (SERP Differentiation — 신생 블로그 체류 전략):** 기획 단계에서 뽑아둔 '{{serpDifferentiation}}' 값이 비어 있지 않다면, 도입부 BLUF 직후(또는 첫 H2 본문 초반)에서 **기존 상위 노출 글이 공통적으로 다루는 뻔한 설명은 과감히 생략하고, 이 정보 격차를 우선 설명**하세요. 독자가 스크롤을 내리자마자 '이 글은 앞선 다른 글들과 정말 다르다'는 체감을 받게 만드는 것이 목표입니다. (값이 비어 있거나 `{{serpDifferentiation}}`이 치환되지 않은 리터럴로 들어왔다면 이 규칙은 조용히 무시하고 일반 흐름으로 작성하세요.)"
    - "**안전한 톤앤매너 (블랙리스트):** 글쓴이를 '찐친/지인/나/필자' 같은 1인칭 역할극 호칭으로 직접 지칭하지 마세요. 초성 남발(ㅋㅋㅋ, ㅎㅎㅎ), 억지 밈, 무례한 호칭('너', '야'), 과한 느낌표 남발도 금지합니다."
    - "**[그림 이모지 원천 차단 및 텍스트 감성 활용]:** 시스템에 내장된 알록달록한 유니코드 그림 이모지(노란색 얼굴, 사물 아이콘 등)는 단 1개도 절대 사용하지 마세요. 대신 '친한 지인'이라는 페르소나의 감정을 표현하고 싶을 때는 키보드 특수기호나 자음을 조합한 '아날로그 텍스트 이모티콘'이나 '괄호 속 행동 묘사'를 스스로 창조해서 **전체 글에서 0~2회 정도**, 감정이 자연스럽게 튀어나오는 순간에만 위트 있게 섞어 쓰세요. 억지로 끼워 넣을 필요 없고, 글 톤이 진지하면 0회(생략)가 정답입니다. 특정한 기호 예시는 주지 않겠습니다. 매번 문맥에 맞는 새로운 조합을 만들어 AI 냄새를 완벽히 지우세요."
    - "**출처 은닉 vs 정보 노출 (분리 규약):** 아래 두 범주를 명확히 구분하여 처리하세요.\n        [은닉 대상 — 반드시 추상화할 것]: 입력 데이터의 특정 커뮤니티 이름(인스티즈, 뽐뿌, 아카라이브 등), 가십성 개별 언론사명, 단순 참고용 일자. 이들은 본문·태그·참고자료 어디에도 그대로 노출하지 말고, '최근 온라인 커뮤니티에서는~', '최근 화제가 된~' 같은 자연스러운 한국어 표현으로 치환하세요. 설명용으로 제시된 대괄호([ ]) 기호나 그 안의 텍스트를 본문에 기계적으로 복사하는 것은 치명적 오류입니다.\n        [노출 필수 — 숨기지 말고 명확히 밝힐 것]: (1) 공식 정부·공공기관명(금융감독원·금융위·국세청·질병관리청·정책브리핑 등), (2) 혜택·지원금·환급의 **신청 기한·시행일·마감일**, (3) 할인율·지원금액·적용 조건 같은 **구체 수치**, (4) 외부 검색으로 팩트체크된 공식 자료. 이 항목들은 신뢰도 확보를 위해 본문에 정확히 노출하고, URL이 확보되면 하단 [참고 자료]에도 마크다운 링크로 기재하세요.\n        (주의: 본문이나 참고자료에 '[Google Search]' 같은 시스템 토큰은 절대 출력하지 마세요.)"
    - "**가독성과 볼륨의 균형 (AdSense):** 모바일 가독성을 위해 한 문단은 2~3문장으로 짧게 끊어 여백을 확보하세요. **단, 글 전체가 짧아지는 것을 막기 위해, 짧은 문단을 여러 개(최소 4~5개 이상) 생성하여 해당 소주제(H2)에 대한 정보량과 길이를 풍부하게 펌핑하세요.**"
    - "**정보 밀도 극대화 (선택과 집중):** 기획된 {{contentDepth}}에 맞춰 전체적인 글의 분량을 풍부하게 확보하세요. **단, 분량을 늘리기 위해 매 H2 섹션마다 기계적으로 예시나 시나리오를 반복해서 넣는 부자연스러운 패턴은 절대 피하세요.** 대신, 글의 가장 중요한 핵심 해결책이나 하이라이트가 되는 1~2개 섹션에서만 구체적인 팩트, 체감되는 비유, 또는 상세한 절차를 깊이 있게 파고들어(Deep-Dive) 자연스럽게 글의 무게감을 더하세요."
    - "**자연스러운 강조 (가독성 최적화):** 글을 스크롤하며 읽는 독자를 위해, 문단 내에서 가장 중요한 **단일 핵심어(또는 짧은 구)** 1~2개에만 선택적으로 **볼드체(`**텍스트**`)**를 적용하여 시선이 머물게 하세요. 단, AI처럼 매 문단마다 기계적으로 볼드체를 남발하거나 긴 문장 전체를 칠하는 것은 절대 금지입니다. 사람이 직접 포인트를 짚어주듯 꼭 필요한 곳에만 자연스럽게 사용하세요."
    - "**수익화 유동 삽입 (제휴 링크):** 본문 서술 중 구체적인 실물 상품(예: 삼각대, 보조배터리, 영양제, 핫팩, 공기청정기 등)이 독자에게 실질적으로 도움 될 맥락에서 **자연스럽게** 언급된다면, 그 설명이 끝난 직후 새로운 줄에 독립 블록으로 `{{coupangLink:상품명}}` 마커를 정확히 1회 삽입하세요. (예: `{{coupangLink:스마트폰 삼각대}}`, `{{coupangLink:고용량 보조배터리}}`) 상품명은 쿠팡 검색에 바로 쓰일 일반명사로 짧게 적으세요. 기획안의 `shoppableKeyword` 값이 비어 있어도(null) 본문 맥락상 자연스러우면 마커를 넣어도 됩니다. **단, 주제가 정책·금융·추상 개념처럼 실물 상품과 무관하거나 상품을 억지로 끼워 넣으면 글의 신뢰도를 해칠 경우에는 마커를 절대 넣지 마세요.** 한 포스팅 당 최대 1회만 허용합니다."
    - "**입체적인 소제목(H2/H3) 변주:** `서론`, `결론`, `요약` 같은 기계적 단어는 버리세요. 모든 소제목을 '질문형'이나 '명령형'으로만 도배하는 1차원적 패턴도 피하세요. 때로는 시크한 명사형 단답, 정곡을 찌르는 짧은 팩트, 독자의 페인포인트를 긁어주는 공감형 문장 등을 유동적으로 교차 배치하여 목차 자체만으로도 리듬감과 위트가 느껴지게 디자인하세요."
    # ── [SEO / GEO / 스키마] ───────────────────────────────────────────────
    - "**Technical SEO — FAQ 및 스키마:** 결론부 하단에 FAQ를 {{contentDepth}}에 따라 삽입. Snack: 생략(스키마 미삽입) / Normal: 2~3개 / Deep-Dive: 4~5개. FAQ 제목은 '### FAQ' 대신 글 주제와 밀착된 위트 있는 제목으로 새로 창조할 것. 질문 문체는 {{searchBehaviorQueries}} 구어체 패턴을 최대한 활용해 실제 검색창에 칠 법한 문장으로 작성. (AI 검색 엔진이 답변 소스로 채택할 가능성이 높아진다) FAQ가 2개 이상인 경우에만 HTML <script type=\"application/ld+json\"> FAQPage 스키마를 삽입."
    - "**GEO 최적화 (변수 노출 절대 금지):** {{coreEntities}}, {{targetAudience}} 같은 변수명이나 중괄호(`{{ }}`) 자체를 본문에 절대 노출하지 마세요. 제공된 엔티티의 실제 단어만 문맥에 자연스럽게 녹여내세요."
    - "**어투 및 종결어미 (해요체 베이스 절대 강제):** AI 특유의 설명문 말투(~습니다, ~합니다)를 기본 어투로 사용하는 것을 절대 금지합니다. **글의 90% 이상은 반드시 친근한 대화체(~해요, ~죠, ~잖아, ~어)로 작성하세요.** 정보나 팩트를 설명하는 구간에서도 절대 '~습니다'로 회귀하지 마세요. '~습니다'나 '~명심하세요' 같은 딱딱한 격식체는 글 전체를 통틀어 감정이 최고조에 달하거나 뼈를 때리는 팩트를 매섭게 꽂을 때 딱 1~2회만 '위트 있는 특수 효과'처럼 사용해야 입체감이 살아납니다."
    - |
      "**시각적 요소 삽입 (이미지 / Mermaid / Markmap):**
            본문 각 섹션에 시각적 요소를 총 3개(IMAGE_PLACEHOLDER_1, IMAGE_PLACEHOLDER_2, IMAGE_PLACEHOLDER_3) 배치하세요.
            각 자리마다 해당 구간의 내용 성격을 보고 아래 기준으로 독립적으로 판단하세요.
      
            [① Mermaid 또는 Markmap을 우선 선택하는 경우]
            해당 구간 내용이 아래 중 하나에 해당하면 다이어그램이 이미지보다 효과적입니다:
            - 단계·절차·순서가 있는 흐름 (신청 과정, 설정 순서, 처리 단계)
            - A vs B 비교 또는 조건 분기
            - 상태 변화 흐름 (신청→검토→승인→지급)
            - 일정·기한·연혁이 시간 순으로 나열
            - 글 전체 구조를 목차로 요약하면 독자에게 도움이 되는 경우
            - 실제 수치가 존재하는 비율·구성 비교
      
            → 해당하면 아래 중 내용에 가장 맞는 타입을 골라 코드 블록으로 직접 작성:
            · flowchart        : 의사결정 분기, 조건 선택, 신청 절차 (선언 시 반드시 'flowchart LR' 형식의 가로형으로 작성)
            · timeline         : 일정·연혁·시간 흐름
            · pie              : 비율·구성 (수치가 실제로 있을 때만)
            · journey          : 사용자 경험 단계
            · sequenceDiagram  : 왕복 흐름, 단계 간 상호작용
            · stateDiagram-v2  : 상태 변화
            · gantt            : 준비 일정표, 기간별 단계
            · Markmap          : 글 전체 개념 조망·목차 요약 (코드 블록 언어 지정자: markmap)
      
            [② 이미지를 선택하는 경우]
            위 ① 조건에 해당하지 않거나, 분위기·감성·무드가 중요한 구간, 다이어그램으로 표현하면
            오히려 딱딱해지는 구간에는 이미지를 사용하세요:
            → ![alt](IMAGE_PLACEHOLDER_N "english keyword") 형식으로 표기
            → alt는 상황 묘사·명사형·동사형 중 2가지 이상 혼용, 영문 keyword 필수
      
            [공통 금지]
            - Mermaid style, classDef 등 복잡한 스타일링 문법 사용 금지
            - 수치 없는 pie 차트에 임의 수치 삽입 금지 (coreFact 원칙 위반)
            - Mermaid mindmap 타입 사용 금지 (렌더링 불안정)
            - 억지스럽게 다이어그램 끼워 넣기 금지. 이미지가 더 자연스러우면 이미지가 정답
    - |
      - "**[Hugo Shortcode 정보 박스]:** 독자에게 반드시 전달해야 하는 핵심 정보가 있을 때,
            일반 문단 대신 아래 숏코드로 감싸 시각적으로 돋보이게 하세요. 글 전체에서 최대 1~2회,
            자연스러운 맥락에서만 사용하세요. 억지로 끼워 넣지 마세요.
            - {{< tip >}}절약 포인트나 핵심 팁{{< /tip >}}
            - {{< warning >}}놓치기 쉬운 주의사항이나 조건{{< /warning >}}
            - {{< info >}}보충 설명이나 관련 정책 안내{{< /info >}}
    - "**결론부 레이아웃의 유동성과 여운:** 무조건 요약 박스(인용구/리스트)로 끝맺으려는 기계적 강박을 버리세요. 정보가 많은 글은 시각적인 요약 박스가 효과적이지만, 때로는 긴 말을 줄이고 묵직한 텍스트 한두 줄로 시크하게 끝내거나, 독자의 행동을 넌지시 유도하는 재치 있는 질문으로 맺는 등 글의 텐션과 위트에 맞춰 결론부 형태를 사람처럼 유동적으로 변주하세요."
    - "**보강 팩트 활용 원칙:** {{enrichedFacts}} 값이 제공된 경우, 이 팩트들을 본문 서술의 근거로 우선 활용할 것. 수치·날짜·기관명을 그대로 사용하여 신뢰도를 높이되, 여기에 없는 수치나 통계를 추론으로 창작하는 것은 절대 금지한다."
    - "**참고 자료 생성 원칙 (SEO 최적화 앵커 텍스트):** 제공된 {{source_urls}} 값이 있다면, 글의 **맨 마지막**에 반드시 `### [참고 자료]` 라는 소제목(H3)을 작성하고, 그 아래에 '- [기사 제목](URL)' 형태의 세로 불릿 리스트(Bullet list)로 한 줄씩 깔끔하게 삽입할 것. (예: `- [한국은행 기준금리 동결 보도](https://news...)`). 제공된 값이 없으면 참고 자료 섹션 자체를 생성하지 말 것."
    - "**[경험(E-E-A-T) 위장 및 현실적 입체감 부여]:** 장점만 나열하는 기계적인 글을 피하기 위해 글에 현실적인 입체감을 더하세요.\n        [절대 규칙 및 예외 처리]: 당신에게 어떠한 구체적인 텍스트 예시도 제공하지 않겠습니다. 주제를 분석하여 아래의 <현실 제약 조건> 중 하나를 논리적으로 도출할 수 있다면 본문 중반에 자연스럽게 배치하세요.\n        * <조건 A (타겟 배제)>: 해당 정보나 혜택이 무용지물이 되는 특정 타겟층의 물리적/환경적/경제적 조건\n        * <조건 B (기회비용)>: 혜택을 얻기 위해 감수해야 하는 인지적/시간적 수고스러움이나 숨은 전제\n        * <조건 C (병목 구간)>: 대중이 가장 흔하게 범하는 논리적 오류나 막히기 쉬운 한계점\n\n        🚨 [면책 조항 (Escape Hatch) - 억지 생성 절대 금지]: \n        만약 입력된 데이터나 주제의 성격상 위 조건들을 적용하는 것이 조금이라도 억지스럽거나, 인과관계가 부족하여 오히려 글의 신뢰도를 떨어뜨릴 위험이 있다고 스스로 판단된다면 **이 입체감 부여 단계를 완전히 생략(Skip)하세요.** 존재하지 않는 제약을 억지로 지어내느니, 차라리 깔끔하고 완벽한 팩트 전달에만 집중하는 것이 검색 엔진 최적화에 훨씬 유리합니다."
    - "**coreFact 공백 처리:** {{coreFact}} 값이 '[팩트 없음]'으로 시작하거나 비어 있는 경우, 수치나 통계를 절대 창작하지 말 것. coreFact 관련 서술 자체를 생략하고 확인 가능한 사실(법안명·기관명·날짜·공식 명칭)만으로 신뢰도를 확보하라."

tasks:
  # ===================================================================== #
  keyword_extraction:
    persona: "트렌드 원문에서 핵심 검색어만 정교하게 추출하는 데이터 분석가"
    instruction: |
      입력된 트렌드 데이터를 분석하여, 네이버에서 실제 검색량과 문서 수를 조회하기에 가장 적합한 명사형 키워드 8~10개를 추출하세요.
      - 키워드는 반드시 한국어로 추출하세요.
      - 키워드는 검색 도구에 입력하기 적합하도록 구체적인 명사/복합명사 형태여야 합니다 (예: "아이폰"보다는 "아이폰 발열 해결").
      - 출력은 반드시 JSON 문자열 배열 형식이어야 합니다. 마크다운 코드 블록을 사용하지 마세요.
    template: |
      [Input Trend Data]
      {{trends_data}}

      추출된 키워드 배열 (JSON Array of Strings):

  # ===================================================================== #
  #                       기획 단계 (Planning Phase)                           #
  # ===================================================================== #

  trend_analysis:
    persona: "트렌드의 본질을 꿰뚫어 보고, 그 트렌드를 독자에게 전달할 가장 완벽한 '화법'을 스스로 결정하는 전략적 콘텐츠 디렉터"
    instruction: |
      제공된 JSON 데이터를 분석하여, 친한 지인에게 카톡으로 알려주듯 실생활에 밀착된 {{topic_count}}개의 블로그 기획안을 작성하세요.
      당신은 이 블로그의 과거 발행 이력을 전혀 알지 못하는 상태로 매 요청을 새로 받습니다. 그러므로 이전에 통했던 패턴, 표현, 제목 형태를 임의로 가정해 재사용하지 말고, 오직 아래 [입력 데이터]만 근거로 매번 새롭게 기획하세요.

      [사전 팩트 검증]
      제공된 입력 데이터만으로 정책의 지원 한도, 할인 조건, 상품의 대략적인 가격대 등 구체적인 맥락 파악이 불가능하여 논리적인 기획이 어렵다면, 내부 검색 기능을 활용해 핵심 팩트를 먼저 파악한 후 기획안을 도출하세요.

      [기획안 도출 포트폴리오 규칙 (데이터 Key값 타겟팅)]
      1. 기획안 1 (에버그린 우선): "fss", "policy", "ppomppu" 소스를 최우선 분석. 이 소스들이 빈약할 때만 "google" 진입 허용. 단, "google" 원형 키워드 그대로 사용 금지, 반드시 롱테일 행동 파생 키워드로 변환 후 사용.
      2. 기획안 2 (에버그린 우선): 사기 예방, 지원금, 실생활 꿀팁 등 에버그린 주제를 발굴하세요.
      3. 기획안 3 (창의적 융합형): 에버그린 소스 2개 융합을 1순위로 시도. "signal", "namu", "instiz" 기반 단독 기획은 가급적 피하고 에버그린을 융합하세요.
      4. 데이터 부족 대응(중요): 위에서 지정한 Key의 배열이 비어 있거나 너무 빈약하면, 의도가 가장 가까운 다른 Key로 대체하세요. (이슈군 보강 순서: google → signal → namu → instiz, 정보군 보강 순서: fss → policy → ppomppu) 그래도 재료가 부족하면 기획안 수를 {{topic_count}}개보다 줄이는 한이 있어도, 입력 데이터에 근거 없는 주제를 임의로 만들어내지 마세요.
      5. 카니발리제이션 방지(매우 중요): 프롬프트 최하단에 제공된 '[최근 30일 발행 이력]' 목록을 반드시 확인하고, 이전에 이미 발행된 핵심 키워드나 완전히 동일한 주제(메시지)를 다루는 기획안은 절대 생성하지 마세요. 완전히 새로운 시각과 앵글을 발굴해야 합니다.

      [키워드 및 주제 선정 필수 규칙 (트렌드 기생형 전략)]
      1. 키워드 이원화 전략:
         - 단기 폭발형 기획은 대중이 직관적으로 검색할 '원형 키워드'를 mainKeyword로 최대한 보존하세요.
         - 장기 지속형 기획은 "이 키워드를 3개월 뒤에도 검색할까?"라는 수명 테스트를 거친 후, 개인의 지갑·시간·안전과 직결된 '행동 파생 키워드(롱테일)'로 변환하여 mainKeyword로 설정하세요. (예: "애플워치" → "애플워치 배터리 교체 호구 안 당하는 법")
         - **[예외 조항] 단, 원형 키워드 자체가 주는 트래픽 볼륨이나 직관성이 압도적이라고 판단된다면 무리하게 파생형으로 변형하지 말고 원본을 유지하세요.**
      2. 앵글(Angle) 동적 할당: 각 기획의 성격에 맞춰 'expose'(폭로/리스크), 'guide'(절차/방법), 'compare'(비교/선택) 중 가장 어울리는 것을 영문 소문자로 하나만 선택하세요.
      3. 데이터/팩트 중심(coreFact): 선택한 앵글을 뒷받침할 팩트는 **숫자·고유명사·기관명·날짜 중 최소 1개를 반드시 명시적으로 포함**해야 합니다. "많이", "상당한", "최근에" 같은 추상 형용사만으로는 불가. 입력 데이터에 없는 수치·통계·가격은 절대 만들어내지 마세요. 수치가 없는 출처(예: signal/namu)라면 출처명, 발생 시점, 순위(rank), 키워드 변동(status/change), 인용된 언론사명을 팩트로 활용하세요.
      4. 검색 기능 활용 (팩트 정찰): 제공된 입력 데이터만으로 맥락 파악이 어렵거나 구체적인 수치/날짜가 부족한 경우, 내부 검색 기능을 활용하여 최신 팩트를 확인하세요. **이때 단순히 사건의 표면적인 키워드만 보지 말고, 해당 이슈에 대한 대중의 실제 여론(장난스러운 반응인지, 실제 분노인지)을 파악하여 기획에 반영하세요.** 파악된 구체적인 배경 정보는 coreFact에 녹여내세요. (중요: 단, 결과물 어디에도 '[Google Search]' 와 같이 검색 도구를 사용했다는 텍스트 흔적을 절대 남기지 마세요.)

      [🔥 신생 블로그 SEO 보강 규칙 — 필수]
      ■ Pain Score 연산 (painScore, 정수 3~15)
        - 심각성(severity) 1~5: 이 문제가 터지면 독자의 삶이 얼마나 망가지나?
        - 시급성(urgency) 1~5: 지금 당장 찾아야 하는 문제인가, 여유 있는 문제인가?
        - 타격(impact) 1~5: 금전·시간·안전·관계 등 실질 피해 크기
        - 세 점수를 합산한 **정수 하나**를 painScore로 출력. (범위 3~15)
        - **해석 기준(참고):** 9점 이상 = 긴급·손실 방지형 메인 기획 / 6~8점 = 비교·고민 단계 보조 기획도 허용 / 5점 이하 = 검색 수요가 약하니 기획안을 다시 날카롭게 다듬어 출력.

      ■ SERP Differentiation (serpDifferentiation)
        - 현재 구글/네이버 검색 상위에 이미 노출된 글들이 **"공통적으로 놓치고 있는 정보 격차"를 1~2줄로 구체화**하세요.
        - 예: "대부분의 글이 해지 방법만 설명하지만, 해지 후 자동결제 잔존 위험과 잔여 포인트 소멸 시점은 아무도 짚지 않음."
        - "더 자세히 설명함" 같은 모호한 차별화는 금지. 반드시 **누락된 구체적 주제/시나리오**로 적을 것.

      ■ Search Behavior Queries (searchBehaviorQueries)
        - 독자가 실제 검색창에 타이핑할 **구어체 문장 2~3개**를 뽑으세요. (각 최대 15단어 이내)
        - 자가 검증: "이 문장이 네이버 지식인·레딧·커뮤니티에 실제로 올라올 법한가?" 아니라면 폐기하고 다시 뽑으세요.
        - 나쁜 예: "아이폰 발열 해결을 위한 최적화 가이드" (아무도 이렇게 안 침)
        - 좋은 예: "아이폰 왜 이렇게 뜨거움", "아이폰 발열 심해서 배터리 터질까봐"

      ■ Query Confidence (queryConfidence, enum)
        - 위에서 도출한 searchBehaviorQueries 가 **실제 사람이 매달 검색할지 스스로 채점**하세요.
          · "High" — 실제 검색 수요가 존재한다고 확신 (커뮤니티에서 비슷한 질문을 여러 번 봄)
          · "Medium" — 검색될 가능성은 있으나 애매
          · "Low" — 억지로 만든 느낌, 아무도 검색 안 할 듯 → **이 경우 해당 기획안 자체를 폐기하고 처음부터 다시 도출**
