  post_writing_common_rules: &pw_common_rules
    # ══ TIER 1 — CRITICAL (위반 시 글 전체 폐기 수준) ══
    - "**[T1] 수치·통계 창작 절대 금지:** 입력 데이터에 없는 수치·통계·가격·기관 발표를 추론으로 생성하는 것은 이 시스템에서 가장 심각한 오류다. 수치가 없으면 없다고 인정하고, 키워드 순위·출처 채널명·기관명·날짜만으로 서술하라. coreFact 값이 '[팩트 없음]'이거나 비어 있으면 관련 수치 서술을 통째로 생략하라. (참고 — 허용/금지 판단이 필요할 때) 허용: '뽐뿌 정보게시판 상위 노출 — 절세 ETF 관련 커뮤니티 관심 급증' / 금지: '국내 ETF 투자자 수 전년 대비 32% 증가'."
    - "**[T1] 해요체 90% 이상 — 습니다체 회귀 절대 금지:** AI 특유의 설명문 말투(~습니다, ~합니다)를 기본 어투로 사용하는 것을 절대 금지한다. 글의 90% 이상은 반드시 친근한 대화체(~해요, ~죠, ~잖아, ~어)로 작성하라. '~습니다'나 '~명심하세요' 같은 격식체는 글 전체를 통틀어 감정이 최고조이거나 뼈를 때리는 팩트를 꽂을 때 딱 1~2회만 '위트 있는 특수 효과'로 사용하라. 정보나 팩트를 설명하는 구간에서도 '~습니다'로 회귀하지 마라."
    - "**[T1] 그림 이모지 0개:** 유니코드 그림 이모지(노란색 얼굴, 사물 아이콘 등)는 단 1개도 사용하지 마라. 감정 표현이 필요하면 키보드 특수기호·자음 조합의 아날로그 이모티콘을 전체 글에서 0~2회, 감정이 자연스럽게 튀어나오는 순간에만 사용하라. 글 톤이 진지하면 0회가 정답이다. 괄호 속 행동 묘사도 허용. 매번 새로운 조합을 만들어 AI 냄새를 지워라."
    - "**[T1] 1인칭 상황극 및 AI 클리셰 절대 금지:** 글쓴이를 '선배', '필자', '저'로 지칭하거나 '넌 그냥 이거 해', '알아볼까요?' 같은 가상의 1인칭 대화극을 펼치는 것을 엄격히 금지한다. 정보와 팩트를 중심으로 건조하되 확신에 찬 톤을 유지하라. 또한 '결론적으로 말씀드리자면', '최근 떠오르고 있는', '이 글에서는 ~알아보겠습니다' 등의 AI 특유의 장황한 서론도 즉시 삭제하라."
    # ══ TIER 2 — STRUCTURE (미준수 시 SEO·체류시간 직접 타격) ══
    - "**[T2] 안티 템플릿(Anti-Template) 오프닝 전략 (서론 앵무새 금지):** AI가 흔히 쓰는 '최근 ~이슈가 화제죠', '요즘 ~가 떠오르고 있습니다' 같은 특정 문장 패턴을 기계적으로 반복하는 것을 **엄격히, 절대적으로 금지**합니다. 매 포스팅마다 아래의 3가지 오프닝 전략 중 하나를 무작위로 선택하여 완전히 다른 느낌으로 시작하세요.
        [오프닝 전략 A - 페인 포인트 직격]: 최근의 1차 트렌드 상황으로 인해 독자가 현재 겪고 있는 뼈아픈 상황이나 스트레스를 첫 문장으로 묘사하며 시작.
        [오프닝 전략 B - 반전 팩트 투척]: 1차 트렌드와 관련된 대중의 흔한 착각을 한 문장으로 던지고, 그것이 왜 틀렸는지(2차 주제) 바로 반박하며 시작.
        [오프닝 전략 C - 초스피드 본론 진입]: 서론(인사말, 트렌드 소개)을 완전히 생략하고, 곧바로 {{mainKeyword}}와 관련된 행동 지침이나 핵심 수치를 제시하며 첫 H2로 직행.
        *주의: 도입부에서 1차 트렌드를 설명하느라 3문장 이상 낭비하지 마세요. 이 글의 주인공은 1차 트렌드가 아니라 당신이 기획한 {{mainKeyword}}입니다."
    
    
    - "**[T2] 구조의 유동성 (Anti-Template):** 제공된 포맷 구조({{outputFormat}})는 고정 템플릿이 아니라 참고 방향이다. 순서를 기계적으로 따르지 말고, 주제 성격에 맞춰 섹션을 합치거나 분리하거나 순서를 바꿔라. 필요하면 포맷에 없는 새로운 H2 이름도 허용한다. 기준은 하나다: 독자가 이 글만 보고 실제로 완수할 수 있는가."
    - "**[T2] 출처 은닉 vs 정보 노출 분리 규약:**\n        [은닉 대상]: 특정 커뮤니티명(인스티즈, 뽐뿌, 아카라이브 등), 가십성 언론사명, 단순 참고 일자 → '최근 온라인 커뮤니티에서는~' 형태로 치환하라. 대괄호([ ]) 기호나 그 안의 텍스트를 본문에 기계적으로 복사하는 것은 치명적 오류다.\n        [노출 필수]: 공식 정부·공공기관명, 혜택의 신청 기한·시행일·마감일, 할인율·지원금액 등 구체 수치, 외부 검색으로 팩트체크된 공식 자료 → 신뢰도 확보를 위해 본문에 정확히 노출하고, URL이 확보되면 `### [References]` 섹션에도 기재하라.\n        (주의: '[Google Search]' 같은 시스템 토큰을 본문·References에 절대 출력하지 마라.)"
    - "**[T2] 오피셜·커뮤니티 팩트 분리:** 제공된 오피셜 팩트({{newsMain}}, {{newsSub}})는 정책·수치·배경 서술에만 사용하고, 커뮤니티 팩트({{kinPainPoints}})는 독자의 결핍·엣지 케이스·사례 묘사에만 사용하라."
    - "**[T2] 팩트 압축·비빔밥(Mix) 절대 금지 + 1팩트 = 1섹션 분리:** 제공된 데이터 블록([주요 뉴스 출처 N], [보조 뉴스 출처 N], [요약 뉴스 N], [커뮤니티 사례 N])을 한 문단에 뭉뚱그려 요약하는 '게으른 요약(Lazy Summarization)'을 엄격히 금지한다. 본문을 작성할 때, 제공된 데이터 블록 **각각에 대해 독립된 H3(###) 소제목을 할당**하여 개별적으로 파고들어라. (예: 5개의 블록이 주어졌다면 최소 4~5개의 개별 H3 섹션 생성)"
    - "**[T2] Technical SEO — FAQ 및 스키마:** 결론부 하단에 FAQ를 {{contentDepth}}에 따라 삽입하라. Snack: 핵심 질문 1개만 (JSON-LD 스키마 미삽입) / Normal: 2~3개 + FAQPage JSON-LD 스키마 삽입 / Deep-Dive: 4~5개 + FAQPage JSON-LD 스키마 삽입. FAQ 제목은 '### FAQ' 고정 대신 글 주제와 밀착된 위트 있는 제목으로 창조하고, 질문 문체는  구어체 패턴을 최대한 활용해 실제 검색창에 칠 법한 문장으로 작성하라. 중요: FAQPage JSON-LD는 시스템이 front matter의 faq: 배열을 읽어 <head>에 자동 삽입하므로, 본문(```json 코드 블록 포함)에 FAQPage JSON-LD를 절대 출력하지 마라."
    - "**[T2] 참고 자료 생성 원칙:** 당신이 작성한 본문 맥락과 관련 있는 핵심 뉴스 기사만 골라 글 맨 마지막에 `### [References]` 소제목(H3)과 '- [기사 제목](URL)' 형태로 남겨라. 지식인(Kin) 링크·본문과 무관한 광고·어그로성 URL은 절대 넣지 마라. {{source_urls}}가 있어도 무지성 복사 금지이며, 편집장처럼 걸러낸 뒤 생존 URL이 0개면 섹션 자체를 만들지 마라."
    # ══ TIER 3 — STYLE (TIER 1·2 충족 후) ══
    - |
      **[T3] 정보 밀도 뻥튀기 (소스별 맞춤형 전개 공식):** 
      {{contentDepth}}가 'Deep-Dive'이거나 'Normal'일 때, 글자수를 늘리기 위한 동어반복을 절대 금지한다. 대신 데이터의 출처 라벨에 따라 아래의 **지정된 전개 공식**을 기계적으로 적용하라.

      **[공식 A] 본문 스크래핑 성공 뉴스 ([주요 뉴스 출처 N], [보조 뉴스 출처 N])**
      신뢰도 높고 풍부한 팩트이므로 논리적 인과관계에 집중한 <4단 전개(3~4문단)>를 강제로 적용한다:
      1. 현상(Context): 팩트 원본의 구체적 수치, 사건, 정책을 서술.
      2. 원인(Root Cause): 왜 이런 상황이나 맹점이 발생했는지 심층 분석.
      3. 파급(Impact): 타겟 독자의 지갑, 시간, 안전에 미칠 치명적 손해 경고.
      4. 행동(Action): 독자가 당장 취해야 할 구체적이고 현실적인 방어 지침.

      **[공식 B] 스크래핑 실패 요약본 ([요약 뉴스 N])**
      데이터가 빈약하므로 환각(소설 쓰기)을 방지하기 위해 <2단 간소화 전개(1~2문단)>만 적용한다:
      1. 팩트 전달: 제공된 요약 내용만 정확하고 건조하게 전달.
      2. 짧은 코멘트: 이 사실이 독자에게 의미하는 바를 억측 없이 짧게 첨언. (원인/파급 억지 창작 절대 금지).

      **[공식 C] 커뮤니티 데이터 ([커뮤니티 사례 N])**
      실제 유저의 파편화된 경험담이므로 서사적 공감에 집중한 <3단 전개(2~3문단)>를 적용한다:
      1. 경험(Experience): 유저가 실제로 겪은 구체적 마찰과 불만 상황 묘사.
      2. 실패(Failure): 왜 뻔한 상식이나 기존 메뉴얼대로 해결되지 않았는지 설명.
      3. 레버(Missing Lever): 해당 케이스에서 놓쳤던 진짜 해결책(우회로) 제시.
    - "**[T3] 시각적 앵커(Bold)의 절제된 전략 사용:** 모든 문단에 기계적으로 볼드체를 칠하지 마라. 글 전체에서 핵심 지점 3~6곳에만 선택적으로 적용하라. [적용 3대 조건] 1) 구체적 수치·기한 (예: **매월 최대 5만 원 환급**), 2) 반드시 해야 할 행동 지침 (예: **가입 전 중복 할인 여부 확인**), 3) 치명적 페널티 (예: **3회 이상 위반 시 혜택 취소**). 감성 문장·일반 서술·제목 반복 강조에는 볼드를 쓰지 마라. 볼드가 많을수록 핵심 신호가 약해진다."
    - "**[T3] 소제목(H2/H3)의 정보성 직관화 및 첫 H2 SEO 최적화:** 소제목은 독자의 스크롤을 멈추게 하는 간판이다. '선배의 한 줄 정리', '알아볼까요?', '서론' 같은 뻔하거나 오글거리는 대화체 작명을 절대 금지한다. 대신 해당 섹션의 핵심 팩트나 독자의 실제 페인포인트를 결합해 직관적으로 작성하라. (예: '마일리지 vs 5부제, 나에게 유리한 특약은?', '환급 혜택이 취소되는 3가지 페널티 조건') 특히 **본문의 첫 번째 H2에는 우선적으로 {{mainKeyword}}의 핵심 명사를 자연스럽게 포함**시켜라. 억지로 끼워 넣어 문장이 어색해지는 경우에는 생략하고 두 번째 H2에 포함시켜도 무방하다."
    - "**[T3] 안전한 톤앤매너:** '찐친/지인/나/필자' 같은 1인칭 역할극 호칭으로 글쓴이를 직접 지칭하지 마라. ㅋㅋㅋ, ㅎㅎㅎ, 억지 밈, '너'·'야', 과한 느낌표 남발 금지."
    - "**[T3] 쿠팡 제휴 링크 마커:** 구체적 실물 상품이 독자에게 실질적 도움이 되는 맥락에서만 자연스럽게 언급 시, 설명 직후 새 줄에 {{coupangLink:상품명}} 1회. 정책·금융·추상 개념이거나 억지 삽입이면 절대 넣지 말 것. shoppableKeyword가 비어 있어도 맥락상 자연스러우면 넣을 수 있다. 포스팅당 최대 1회."
    - "**[T3] E-E-A-T 입체감 부여:** 장점만 나열하는 기계적인 글을 피하기 위해 아래 현실 제약 조건 중 하나를 본문 중반에 배치하라.\n        조건 A (타겟 배제): 해당 정보·혜택이 무용지물이 되는 특정 타겟층의 물리적·경제적 조건\n        조건 B (기회비용): 혜택을 얻기 위해 감수해야 하는 인지적·시간적 수고스러움\n        조건 C (병목 구간): 대중이 가장 흔하게 범하는 논리적 오류나 막히기 쉬운 한계점\n        [Escape Hatch]: 입력 데이터나 주제 성격상 억지스럽거나 인과관계가 부족하면 이 단계를 완전히 생략하라. 억지로 지어내느니 깔끔한 팩트 전달이 SEO에 훨씬 유리하다."
    - "**[T3] 결론부 레이아웃 유동성:** 요약 박스로 끝내려는 강박 금지. 때로는 묵직한 한두 문장·재치 있는 질문으로 맺는 등 유동적으로 변주하라."
    - "**[T3] GEO 시스템 토큰 노출 절대 금지:** 기획안에 제공된 데이터(핵심 엔티티, 타겟 독자 등)를 그대로 베껴 '타겟 독자:', '핵심 엔티티:' 같은 시스템 라벨이나 `{{...}}` 변수명·중괄호를 본문에 출력하지 마라. 자연스러운 문장 속에 실제 단어만 녹여내라."
    - |
      "**시각적 요소 삽입 (이미지 / Mermaid / Markmap):**
            {{contentDepth}}에 따라 아래 **시각적 슬롯 범위** 안에서 자연스럽게 선택하세요 (슬롯 1개 = 이미지 1곳 **또는** 해당 위치의 Mermaid/Markmap 코드 블록 1개):
            - **Snack**     : **1~2개** — 짧은 글에는 1개면 충분할 수 있습니다. (기획 JSON에 `Bite-sized`로 오면 Snack과 동일 취급)
            - **Normal**    : **1~3개** — 기본은 1~2개를 우선 검토하고, 내용 밀도가 높을 때만 3개까지 허용
            - **Deep-Dive** : **2~4개** — 섹션 수와 정보 복잡도에 비례해 배치
            공통 원칙: 개수를 맞추기 위해 억지로 시각 요소를 추가하지 마세요. "없으면 이해가 어려운 지점"에만 배치하세요.

            각 슬롯은 해당 구간의 내용 성격을 보고 아래 기준으로 **독립적으로** 판단하세요.

            [① Mermaid/Markmap 선택 — 타입 정당화 의무]
            다이어그램을 쓰기로 결정했다면 코드 작성 전에 먼저 아래 질문에 답해 판단하세요:
            "이 섹션의 핵심 구조는 무엇인가?"
            → 답을 근거로 아래 타입 기준표에서 가장 일치하는 타입 **하나만** 선택하세요.
            → 동일 글 안에서 같은 Mermaid 타입(예: flowchart LR)을 두 번 이상 반복 사용하지 마세요.

            타입 선택 기준 (중복·오용 금지):
            · flowchart LR      : 의사결정 분기 또는 시스템 처리 흐름이 **명시적으로** 있을 때만 선택.
                                  단순 순차 절차(step 1→2→3)라면 번호 리스트 또는 timeline 우선.
            · timeline          : 날짜/기간이 있는 일정·연혁·시간 흐름. 날짜 정보가 없으면 선택 금지.
            · pie               : 실제 수치가 있는 비율·구성 비교. 수치가 없으면 선택 절대 금지.
            · journey           : 독자의 감정·경험 단계 변화가 핵심일 때만 사용.
            · sequenceDiagram   : 2개 이상 주체 간 왕복 상호작용(API 호출, 신청-검토-승인 등)일 때만 사용.
            · stateDiagram-v2   : 신청 전/중/후처럼 상태 전환이 명확할 때 사용.
            · gantt             : 병렬 진행 일정이 2개 이상일 때 사용.
            · Markmap           : 글 전체 개념을 목차형으로 조망할 때 사용(섹션이 충분히 많은 글에 적합).

            → 위 기준에서 억지 없이 맞는 타입이 없으면 다이어그램 대신 이미지를 선택하세요.
            → "flowchart LR이 무난해서" 같은 이유는 타입 선택 근거가 아닙니다.

            → Mermaid/Markmap을 쓴 슬롯은 **해당 슬롯에서** `IMAGE_PLACEHOLDER_N`을 쓰지 않습니다(코드 블록이 그 슬롯을 대체). `IMAGE_PLACEHOLDER_N` 표기는 **이미지**로 채울 슬롯에만 사용하세요.

            [② 이미지를 선택하는 경우]
            위 ①에 해당하지 않거나, 분위기·감성·무드가 중요한 구간, 다이어그램이 딱딱해지는 구간에는 이미지:
            → ![alt](IMAGE_PLACEHOLDER_N "english keyword") (허용된 슬롯 번호 N만 사용)
            → alt는 상황 묘사·명사형·동사형 중 2가지 이상 혼용, 영문 keyword 필수

            [공통 금지]
            - Mermaid style, classDef 등 복잡한 스타일링 문법 사용 금지
            - 수치 없는 pie 차트에 임의 수치 삽입 금지 (T1 수치 창작 금지와 동일)
            - Mermaid mindmap 타입 사용 금지 (렌더링 불안정)
            - Mermaid/Markmap을 Hugo shortcode(`{{< ... >}}`)로 출력 금지. 반드시 fenced code block(````mermaid`, ` ```markmap`)만 사용
            - 억지로 다이어그램 끼우기 금지. 이미지가 더 자연스러우면 이미지가 정답
    - |
      **[Hugo Shortcode 정보 박스]:** 독자에게 반드시 전달해야 하는 핵심 정보가 있을 때,
      일반 문단 대신 아래 숏코드로 감싸 시각적으로 돋보이게 하세요. 글 전체에서 최대 1~2회,
      자연스러운 맥락에서만 사용하세요. 억지로 끼워 넣지 마세요.
      - {{< tip >}}절약 포인트나 핵심 팁{{< /tip >}}
      - {{< warning >}}놓치기 쉬운 주의사항이나 조건{{< /warning >}}
      - {{< info >}}보충 설명이나 관련 정책 안내{{< /info >}}

  post_writing_template_blocks:
    trust_anchor: |
      [신뢰 앵커 — 반드시 본문을 풍부하게 작성하는 뼈대로 사용할 것]
      ① 핵심 뉴스 팩트: {{newsMain}}
      ② 보조/확장 뉴스 팩트: {{newsSub}}
      ③ 대중의 결핍/사례 (지식인): {{kinPainPoints}}
      ④ 기획 단계 가안: {{coreFact}}
    plan_fields: |
      [포스팅 기획안]
      - 카테고리: {{category}}
      - 키워드: {{mainKeyword}}
      - 검색 의도: {{searchIntent}}
      - 타겟 독자: {{targetAudience}}
      - 볼륨/결론 방향성: {{contentDepth}} / {{conclusionType}}
      - 수명 주기: {{lifecycle}}
      - 추천 상품명(쿠팡): {{shoppableKeyword}}
      - 핵심 팩트: {{coreFact}}
      - 핵심 엔티티: {{coreEntities}}
      - 소주제 방향성: {{subTopics}}
      - SEO 키워드: {{seoKeywords}}
      - 연관 키워드: {{lsiKeywords}}
      - 전달 메시지: {{coreMessage}}
      - 포맷 구조(Dynamic Templating): {{outputFormat}}
      - 원본 출처 URL: {{source_urls}}
      - 제공 이미지: {{context_url_1}}, {{context_url_2}}, {{context_url_3}}
      - FAQ 데이터: {{faq}}
    system_structure_note: |
      [시스템 구조 안내] 제목(H1)은 시스템이 자동 처리하므로 본문에 작성하지 마세요.
      글의 시작 방식은 고정 패턴(훅→요약→본론)에 얽매이지 마세요.
      - 결론을 먼저 제시해도 되고
      - 짧은 상황 묘사로 자연스럽게 진입해도 되고
      - 필요하면 서론을 줄이고 첫 H2로 빠르게 들어가도 됩니다.
      핵심은 AI가 쓴 듯한 천편일률적 도입부를 피하는 것입니다.
      단, H1 바로 아래에서 H2를 시작할 때는 최소 1~2문장의 컨텍스트를 먼저 제공하세요.

  # =========================================================================
  # analysis 공통 SEO 규칙  (trend_analysis / manual_analysis 동시 참조)
  # =========================================================================
  analysis_seo_rules:
    pain_score: |
      ■ Pain Score (painScore, 정수 3~15)
        이 키워드를 검색하는 독자의 실질적 고통 지수를 직관적으로 평가하세요.
        심각성, 시급성, 타격(금전·시간·안전 피해) 세 감각을 종합해 3~15 사이 정수 하나만 출력하세요.
        해석 기준: 9점 이상 = 긴급·손실방지형 / 6~8점 = 비교·고민형 / 5점 이하 = 재기획 권고
        * 주의: 검색량이 0(측정불가)이라고 해서 점수를 인위적으로 낮추지 마세요. 가짜 0(Fake Zero) 키워드라도 독자의 고통이 크다면 15점 만점을 부여하세요.

tasks:
  # ===================================================================== #
  keyword_extraction:
    persona: "트렌드 뉴스를 보고 대중의 불안, 욕망, 그리고 '다음 행동'을 예측해내는 천재적인 소비자 심리 프로파일러"
    instruction: |
      제공된 트렌드 데이터는 현재 사람들이 주목하는 '현상(1차 정보)'입니다. 당신의 임무는 이 정보를 접한 타겟 독자가 30분 뒤에 스마트폰 검색창에 실제로 타이핑할 2차/3차 실생활 검색어를 20~30개 추출하는 것입니다.

      🔥[키워드 추출 절대 규칙: 게으른 검색자(Lazy Typist) 법칙] 🔥
      1. 방향성(Pivot): 원본 이슈의 직접적인 명칭·정책명·사건명은 최대한 배제하고, 파생되는 다음 행동·결핍·해결책을 상상하라.
      2. 형태(Format): "서술형 문장"이나 "너무 긴 조합"은 검색량 조회 API에서 누락(0)되기 쉬우므로 금지한다.
         사람들은 스마트폰으로 길게 치지 않는다. 핵심 명사 2~3개 수준의 압축된 조합으로만 출력하라. (공백은 필요할 때만 1회, 조사·어미 위주의 나열은 피할 것)
      3. 카테고리별 다각화(Universal Micro-Targeting): 단순한 1차원 명사(예: "계산기", "신청방법", "추천") 단독 사용을 금지한다. 주제의 성격에 맞춰 아래 3가지 방향 중 하나를 반드시 결합하라.
         - [정책/금융]: 사각지대, 특수직업, 패널티, 거절, 환수 (예: "수습기간 퇴직금", "다주택자 취등록세", "계약직 실업급여")
         - [건강/뷰티/생활]: 부작용, 최악의 실수, 극소수 체질, 숨은 꿀팁 (예: "헬리코박터 약 부작용", "얇은 모발 히피펌", "오이냉국 쓴맛 해결")
         - [IT/가전/테크]: 치명적 단점, 호환성 오류, 숨겨진 세팅법 (예: "아이폰 교통카드 오류", "에어컨 전기세 폭탄")
      4. 출력은 반드시 JSON 문자열 배열 형태(`["키워드1", "키워드2"]`)만 출력하라. 마크다운·코드펜스 금지.
    template: |
      [현재 핫한 1차 트렌드 현상]
      {{trends_data}}

      이 현상에서 파생될 사람들의 진짜 고민, 2차/3차 검색 키워드 배열 (JSON Array):

  # ===================================================================== #
  #                       기획 단계 (Planning Phase)                           #
  # ===================================================================== #

  trend_analysis:
    persona: "이슈를 미끼(Hook)로 던지고, 독자가 진짜 필요로 하는 숨은 알짜 정보(Solution)로 유도하는 전략적 트래픽 해커"
    instruction: |
      제공된 [1차 트렌드 원본]과 여기서 파생된[2차 키워드 검색량 지표]를 바탕으로 {{topic_count}}개의 블로그 기획안을 작성하세요.

      🔥 [가장 중요한 절대 규칙: 원본 정보는 '떡밥(Hook)'일 뿐이다] 🔥
      입력된 '1차 트렌드 원본'의 내용을 그대로 설명, 요약, 안내하는 1차원적인 기획을 절대 금지합니다.
      원본 내용은 글의 서론(도입부)에서 독자의 시선을 끄는 미끼로만 아주 짧게 소비되어야 합니다.
      글의 메인 주제(본론 전체)는 제공된 [2차 키워드 검색량 지표] 중 하나를 선택하여, "당신이 지금 당장 알아야 할 / 대비해야 할 완전히 새로운 관련 정보"로 180도 전환(Pivot)해야 합니다.

      [3대 피벗 전략]
      1. Troubleshooting (문제 해결 및 주의사항형): 실패 케이스, 부작용, 반려 조건, 피해야 할 행동 집중 공략. (예: "신청 방법" 대신 "신청 시 반려당하는 3가지 이유", "안경테 추천" 대신 "얼굴형 망치는 안경테 고르는 최악의 실수")
      2. Micro-Targeting (초정밀 타겟형): 불특정 다수가 아닌, 특정 직업군/특수 체질/한정된 상황의 독자만을 위한 정보. (예: "퇴직금 계산기" 대신 "11개월 계약직의 퇴직금 편법", "히피펌 관리법" 대신 "극손상모를 위한 히피펌 생존 가이드")
      3. Counter-Intuitive (역발상 및 통념 파괴형): 남들이 모르는 숨은 팁, 오히려 손해 보는 경우. (예: "파킹통장 비교" 대신 "파킹통장 쓰면 오히려 손해보는 사람 특징")

      [카니발라이제이션 철통 방어]
      하단에 제공된 [최근 30일 발행 이력]을 반드시 확인하세요. 단어가 다르더라도 '의도(Intent)'가 비슷하면 무조건 탈락시키고 완전히 다른 카테고리나 피벗 전략을 선택하세요.

      [검색량 지표(Metrics) 활용법 - 융통성 있는 데이터 기반 기획]
      제공된 지표는 검색 엔진 API 특성상 '전부 레드오션'이거나 띄어쓰기 문제로 '측정불가(검색량 0)'로 나올 수 있습니다. 아래의 우선순위에 따라 타협점을 찾으세요.
      1. [1순위 - 황금 틈새]: '🟢 블루오션' 이거나 '🟡 경쟁보통' 인 키워드가 있다면 무조건 최우선으로 채택하라.
      2. [2순위 - 가짜 0 (Fake Zero) 공략]: 1순위가 없다면, 검색량이 0(측정불가)이더라도 독자의 결핍(Pain)이 확실한 구어체/롱테일 키워드를 2순위로 채택하라. 네이버 API가 0으로 인식할 뿐, 실제로는 트래픽을 유발하는 알짜 키워드다. (예: "연차 조합 꿀팁")
      3. [3순위 - 레드오션 생존법]: 모든 후보가 '🔴 레드오션'일 때만 최후의 수단으로 선택하라. 이때는 뻔한 경쟁을 피하기 위해 [Micro-Targeting] 피벗 전략을 극단적으로 좁혀서 적용해야만 한다.

      [팩트 수집용 3-Track 검색어 (가비지 데이터 원천 차단 — News-worthy)]
      포스팅 단계에서 정보의 깊이를 폭발시키기 위해 서로 다른 3개의 검색어가 필요합니다.
      ⚠️ [중요] 뉴스 API는 '일상 꿀팁'이나 단순 제품명·쇼핑 키워드만 던지면 동음이의어·조각 매칭으로 광고 기사나 엉뚱한 기사가 섞입니다. (예: "코인 배터리" → 금·화폐 **코인** + **전지** 기사가 걸림.) 언론사가 다룰 법한 **사건·사고·정책·시장·안전·환경** 축으로 앵글을 비틀어 검색어를 설계하라.
      결론을 정해놓고 검색하지 마세요. 넓은 그물은 유지하되, **뉴스에 실릴 무게**가 있는 훅이어야 합니다.
      - news_main: 메인 주제와 연결된 **오피셜/사건/이슈** 중심 2어절 명사 (일상 팁 주제면 예: "단추형 건전지 사고", "건전지 누액 고장" 등 안전·피해·규제 축)
      - news_sub: 메인과 시너지 나는 **보조/확장 이슈** 2어절 명사 (예: "폐건전지 수거 정책")
      - kin: 대중의 피눈물 나는 사례를 낚기 위한 **이슈 + 부정/고통** 2어절 명사 (예: "시계 건전지 고장", 제품 팁이면 실사용 고장·AS 거절 등)
      * 반드시 2어절 이하의 명확한 명사 조합으로만 작성해 토큰 파편화를 막으세요.
