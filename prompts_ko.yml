            "angleType": "expose, guide, compare 중 하나만 영문 소문자로 입력",
            "searchIntent": "이 키워드를 검색하는 사람의 진짜 속마음이나 불안감",
            "contentDepth": "Snack (가벼운 요약) / Normal (일반 정보) / Deep-Dive (심층 분석) 중 검색 의도에 맞춰 택 1",
            "conclusionType": "Q&A / 핵심 한 줄 요약 / 단호한 행동 촉구(CTA) / 생각할 거리 던지기 중 검색 의도에 맞춰 택 1",
            "coreFact": "본문의 신뢰도를 높여줄 결정적이고 구체적인 팩트/수치",
