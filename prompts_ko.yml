      - "- **가독성과 볼륨의 균형 (AdSense):** 모바일 가독성을 위해 한 문단은 2~3문장으로 짧게 끊어 여백을 확보하세요. **단, 글 전체가 짧아지는 것을 막기 위해, 짧은 문단을 여러 개(최소 4~5개 이상) 생성하여 해당 소주제(H2)에 대한 정보량과 길이를 풍부하게 펌핑하세요.**"
      - "- **정보 밀도 극대화 (선택과 집중):** 기획된 {{contentDepth}}에 맞춰 전체적인 글의 분량을 풍부하게 확보하세요. **단, 분량을 늘리기 위해 매 H2 섹션마다 기계적으로 예시나 시나리오를 반복해서 넣는 부자연스러운 패턴은 절대 피하세요.** 대신, 글의 가장 중요한 핵심 해결책이나 하이라이트가 되는 1~2개 섹션에서만 구체적인 팩트, 체감되는 비유, 또는 상세한 절차를 깊이 있게 파고들어(Deep-Dive) 자연스럽게 글의 무게감을 더하세요."
      - "- **수익화 강제 (제휴 링크 삽입):** 제공된 기획안에 실물 상품(shoppableKeyword)이 존재하거나, 본문 중 보안 카메라, 영양제 등 구매 가능한 아이템이 언급된다면 **반드시 의도적으로 해당 상품을 추천하거나 필요성을 강조하는 문맥을 1회 이상 조성하세요.** 그리고 해당 설명이 끝난 직후, 새로운 줄(엔터)에 독립적인 블록으로 '{{coupangLink}}' 변수를 무조건 1회 삽입하여 수익화를 강제하세요."
      - "- **시각적 리듬 랜덤화 (Anti-AI):** 본문을 전개할 때 매번 똑같은 패턴(텍스트 후 불릿 나열)을 반복하지 마세요. 어떤 문단은 짧은 텍스트로만 치고 빠지고, 어떤 문단은 `> 인용구`를 활용해 강조하며, 어떤 부분은 마크다운 `Table`을 쓰는 등, 글의 섹션마다 시각적 요소의 배치 순서와 형태를 불규칙하게 섞어 사람의 호흡처럼 자연스럽게 만드세요."
      - "- **금지된 소제목(H2/H3) 패턴:** `서론`, `본론`, `결론`, `요약`, `마치며`, `주의사항` 같은 범용적이고 기계적인 단어는 H2/H3 소제목에 절대 사용하지 마세요. 모든 소제목은 반드시 {{mainKeyword}}나 구체적인 팩트가 포함된 **'질문형'** 또는 **'행동 촉구형(문장)'**으로 작성하세요."
      - "- **Technical SEO (FAQ 스키마 마크업):** 글의 맨 마지막 결론부 섹션이 끝난 후, HTML `<script type=\"application/ld+json\">` 태그를 사용하여 제공된 {{faq}} 데이터에 대한 정확한 FAQPage 스키마를 삽입하세요. 마크다운 코드 블록으로 감싸지 말고 순수한 HTML 태그 형태로 삽입하여 검색 엔진이 즉시 읽을 수 있게 하세요."
      - "타겟 독자 적합성: 제공된 {{targetAudience}}의 어휘 수준·관심사·일상 맥락에 맞춰 예시와 비유를 선택하세요. 페르소나에 맞지 않는 전문 용어나 동떨어진 사례는 피하세요."
      - "GEO 최적화 (엔티티 활용 및 변수 노출 금지): 제공된 {{coreEntities}} 내의 단어들을 문맥에 자연스럽게 녹여내세요. **중괄호({{ }})나 변수명(coreEntities, targetAudience 등)을 본문에 그대로 출력하는 것은 절대 금지입니다.**"
      - "종결어미의 기계적 반복 엄금: 동일한 문장 종결 표현을 3회 이상 연속으로 사용하지 마세요. 질문형, 명사형 마무리 등을 섞어 호흡을 쪼개세요."
      - "검색 의도 대응 (문제 해결형): 서론에서 불안감을 공감했다면, 본문 중반부부터는 그 불안을 확실하게 잠재워 줄 구체적인 회피·해결 행동 지침에 집중하세요."
      - "GEO 최적화 (상단 요약 BLUF): 도입부 직후, AI 검색 엔진이 쉽게 긁어갈 수 있도록 핵심 결론({{coreFact}} 포함)을 2~3문장으로 요약하세요. 인용구(>), 볼드체 등 형태를 매번 다르게 변주하세요."
      - "시각적 구조화 & 이미지 절대 형식 준수: 복잡한 수치나 데이터가 있다면 **마크다운 표(Table)**로 구조화하되, 불필요하면 억지로 만들지 마세요. 제공된 이미지 플레이스홀더({{context_url_1}}, {{context_url_2}}, {{context_url_3}})는 반드시 ![이미지 설명](IMAGE_PLACEHOLDER_N \"english keyword\") 형식으로 본문 문맥에 맞는 위치에 삽입하세요. (N은 1, 2, 3) **이 플레이스홀더 문자열을 마크다운 문법 없이 그냥 텍스트로 노출하거나, 영문 keyword를 빠뜨리는 것은 치명적인 오류입니다.**"
      - "GEO 최적화 (결론부 동적 할당 및 디자인): 기획된 {{conclusionType}}에 맞춰 마지막 H2 섹션을 구성하세요. 단순 텍스트 나열을 피하고, 결론부는 반드시 인용구(>) 블록이나 마크다운 리스트, 볼드체를 적극 활용하여 시각적으로 돋보이는 박스 형태의 레이아웃으로 디자인하세요."
      - "Google Search 기반 딥 데이터 매핑: 본문 작성 시 정확한 가격, 날짜, 장소, 통계 수치가 필요하다면 [Google Search]를 적극 활용하여 팩트 체크된 정보를 기재하세요. 막연한 추측성 표현을 지양하고 전문가 수준의 데이터를 확보하세요. 신뢰도를 높이는 공신력 있는 출처는 글 하단의 [참고 자료] 섹션에 명확히 밝히세요."
      - "권위 있는 출처 인용 (Reference SEO): 글의 마지막 결론부 직전에, 검색을 통해 확인한 공신력 있는 언론사나 공식 기관의 정보 출처를 '[참고 자료]' 섹션으로 1~2개 포함하세요. (예: \"본 정보는 OOO 공식 배포 자료를 바탕으로 팩트 체크되었습니다.\")"
    template: |
      [포스팅 기획안]
      - 키워드: {{mainKeyword}}
      - 타겟 독자: {{targetAudience}}
      - 볼륨/결론 방향성: {{contentDepth}} / {{conclusionType}}
      - 핵심 팩트: {{coreFact}}
      - 핵심 엔티티: {{coreEntities}}
      - 소주제 방향성: {{subTopics}}
      - 연관 키워드: {{lsiKeywords}}
      - 전달 메시지: {{coreMessage}}
      - 제공 이미지: {{context_url_1}}, {{context_url_2}}, {{context_url_3}}
      - FAQ 데이터: {{faq}}

      인사말 없이 H1을 만들지 말고 H2(##)부터 본문을 바로 시작하세요. (제목은 시스템이 frontmatter로 따로 처리하므로 본문 H1 중복 금지)

