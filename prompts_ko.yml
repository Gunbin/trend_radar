  # =========================================================================
  # post_writing_* 3종 공통 규칙  (수정 시 3개 task 일괄 반영됨)
  # =========================================================================
  post_writing_common_rules: &pw_common_rules
    # ══ TIER 1 — CRITICAL (위반 시 글 전체 폐기 수준) ══
    - "**[T1] 수치·통계 창작 절대 금지:** 입력 데이터에 없는 수치·통계·가격·기관 발표를 추론으로 생성하는 것은 이 시스템에서 가장 심각한 오류다. 수치가 없으면 없다고 인정하고, 키워드 순위·출처 채널명·기관명·날짜만으로 서술하라. coreFact 값이 '[팩트 없음]'이거나 비어 있으면 관련 수치 서술을 통째로 생략하라. (참고 — 허용/금지 판단이 필요할 때) 허용: '뽐뿌 정보게시판 상위 노출 — 절세 ETF 관련 커뮤니티 관심 급증' / 금지: '국내 ETF 투자자 수 전년 대비 32% 증가'."
    - "**[T1] 해요체 90% 이상 — 습니다체 회귀 절대 금지:** AI 특유의 설명문 말투(~습니다, ~합니다)를 기본 어투로 사용하는 것을 절대 금지한다. 글의 90% 이상은 반드시 친근한 대화체(~해요, ~죠, ~잖아, ~어)로 작성하라. '~습니다'나 '~명심하세요' 같은 격식체는 글 전체를 통틀어 감정이 최고조이거나 뼈를 때리는 팩트를 꽂을 때 딱 1~2회만 '위트 있는 특수 효과'로 사용하라. 정보나 팩트를 설명하는 구간에서도 '~습니다'로 회귀하지 마라."
    - "**[T1] 그림 이모지 0개:** 유니코드 그림 이모지(노란색 얼굴, 사물 아이콘 등)는 단 1개도 사용하지 마라. 감정 표현이 필요하면 키보드 특수기호·자음 조합의 아날로그 이모티콘을 전체 글에서 0~2회, 감정이 자연스럽게 튀어나오는 순간에만 사용하라. 글 톤이 진지하면 0회가 정답이다. 괄호 속 행동 묘사도 허용. 매번 새로운 조합을 만들어 AI 냄새를 지워라."
    - "**[T1] 1인칭 상황극 및 AI 클리셰 절대 금지:** 글쓴이를 '선배', '필자', '저'로 지칭하거나 '넌 그냥 이거 해', '알아볼까요?' 같은 가상의 1인칭 대화극을 펼치는 것을 엄격히 금지한다. 정보와 팩트를 중심으로 건조하되 확신에 찬 톤을 유지하라. 또한 '결론적으로 말씀드리자면', '최근 떠오르고 있는', '이 글에서는 ~알아보겠습니다' 등의 AI 특유의 장황한 서론도 즉시 삭제하라."
    # ══ TIER 2 — STRUCTURE (미준수 시 SEO·체류시간 직접 타격) ══
    - "**[T2] 도입부 구조 강제 (Hook & BLUF):** H1 제목 다음에는 H2를 바로 열지 말고, 반드시 브릿지 역할의 도입부 텍스트를 먼저 작성하라. 첫 문장은 반드시 (a) {{coreFact}}의 구체 수치·고유명·날짜를 정면에 꽂는 팩트형 훅, (b) 타겟 독자의 속마음을 그대로 옮긴 한 줄(일반화된 공감 질문·클리셰 도입은 금지), (c) 뻔한 상식을 뒤집는 반전 팩트 중 하나여야 한다. 훅 직후 AI 검색 엔진이 긁어갈 핵심 결론({{coreFact}} 포함)을 2~3문장으로 시크하게 요약(BLUF)하라. 첫 문장은 단정적 사실·반문으로 시작해도 좋다. 데이터에서 도출된 판단을 단호하게 서술하되, 가상 1인칭 경험담·불확실한 완화 표현은 금지. 매번 문맥에 맞는 텐션을 창조하라."
    - "**[T2] SERP Differentiation 선제 배치:** {{serpDifferentiation}} 값이 비어 있지 않다면, BLUF 직후(또는 첫 H2 초반)에서 기존 상위 글이 공통적으로 다루는 뻔한 설명은 과감히 생략하고 이 정보 격차를 우선 설명하라. 독자가 스크롤을 내리자마자 '이 글은 다른 글들과 다르다'는 체감이 목표다. 값이 비어 있거나 리터럴로 들어오면 이 규칙은 조용히 무시하고 일반 흐름으로 작성하라."
    - "**[T2] Information Gain 구현 의무:** {{infoGainAngle}} 값을 본문 H2 섹션 1개 이상으로 반드시 구현하라. '이건 다른 데서 못 본 시각'이어야 한다. 단, 데이터에 없는 수치·사례 창작은 금지."
    - "**[T2] Dynamic Templating 강제:** {{outputFormat}} 구조에 맞게 전체 글의 레이아웃을 설계하라. 매 글마다 동일한 '도입-본론-결론' 패턴을 피하고 지정된 포맷에 맞춰 전개하라."
    - "**[T2] 출처 은닉 vs 정보 노출 분리 규약:**\n        [은닉 대상]: 특정 커뮤니티명(인스티즈, 뽐뿌, 아카라이브 등), 가십성 언론사명, 단순 참고 일자 → '최근 온라인 커뮤니티에서는~' 형태로 치환하라. 대괄호([ ]) 기호나 그 안의 텍스트를 본문에 기계적으로 복사하는 것은 치명적 오류다.\n        [노출 필수]: 공식 정부·공공기관명, 혜택의 신청 기한·시행일·마감일, 할인율·지원금액 등 구체 수치, 외부 검색으로 팩트체크된 공식 자료 → 신뢰도 확보를 위해 본문에 정확히 노출하고, URL이 확보되면 `### [References]` 섹션에도 기재하라.\n        (주의: '[Google Search]' 같은 시스템 토큰을 본문·References에 절대 출력하지 마라.)"
    - "**[T2] 보강 팩트 활용 원칙:** {{enrichedFacts}} 값이 제공되면 본문 서술의 근거로 우선 활용하라. 수치·날짜·기관명을 그대로 사용하되, 여기에 없는 수치·통계 창작은 절대 금지."
    - "**[T2] Technical SEO — FAQ 및 스키마:** 결론부 하단에 FAQ를 {{contentDepth}}에 따라 삽입하라. Snack(또는 Bite-sized): 핵심 질문 1개만 (JSON-LD 스키마 미삽입) / Normal: 2~3개 + FAQPage JSON-LD 스키마 삽입 / Deep-Dive: 4~5개 + FAQPage JSON-LD 스키마 삽입. FAQ 제목은 '### FAQ' 고정 대신 글 주제와 밀착된 위트 있는 제목으로 창조하고, 질문 문체는 {{searchBehaviorQueries}} 구어체 패턴을 최대한 활용해 실제 검색창에 칠 법한 문장으로 작성하라."
    - "**[T2] 참고 자료 생성 원칙 (SEO 앵커):** {{source_urls}}가 있으면 글 **맨 마지막**에 `### [References]` 소제목(H3)과 '- [기사 제목](URL)' 불릿 리스트를 작성하라. 없으면 섹션 생성 금지."
    # ══ TIER 3 — STYLE (TIER 1·2 충족 후) ══
    - "**[T3] 정보 밀도·볼륨 균형:** {{contentDepth}}에 맞게 분량을 확보하되 불필요한 배경·억지 공감·가상 예시는 생략. '~라고 할 수 있습니다', '~것이 중요합니다' 같은 빈 마무리 금지. 모바일 가독성을 위해 한 문단은 2~3문장으로 짧게 끊되, 짧은 문단을 최소 4~5개 이상 생성해 H2 단위 정보량을 풍부하게 유지. 분량 늘리기 위해 매 H2마다 기계적으로 예시·시나리오를 반복하는 패턴 절대 금지. 핵심 1~2개 섹션에서만 Deep-Dive해 무게감을 더하라."
    - "**[T3] 시각적 앵커(Bold)의 전략적 강제 적용:** 바쁜 독자가 스크롤을 내리며 볼드체만 훑어봐도 글의 핵심이 파악되도록 하라. 본문의 **모든 문단마다 반드시 1~2개의 핵심어(구)**에 볼드체를 적용하라. [적용 3대 조건] 1) 구체적인 수치/기한 (예: **매월 최대 5만 원 환급**), 2) 반드시 해야 할 행동 지침 (예: **가입 전 중복 할인 여부 확인**), 3) 치명적 페널티 (예: **3회 이상 위반 시 혜택 취소**). 이 조건에 해당하지 않는 감성적 문장이나 단순 서술어에는 절대 칠하지 마라."
    - "**[T3] 소제목(H2/H3)의 정보성 직관화:** 소제목은 독자의 스크롤을 멈추게 하는 간판이다. '선배의 한 줄 정리', '알아볼까요?', '서론' 같은 뻔하거나 오글거리는 대화체 작명을 절대 금지한다. 대신 해당 섹션의 핵심 팩트나 독자의 실제 페인포인트를 결합해 직관적으로 작성하라. (예: '마일리지 vs 5부제, 나에게 유리한 특약은?', '환급 혜택이 취소되는 3가지 페널티 조건')"
    - "**[T3] 안전한 톤앤매너:** '찐친/지인/나/필자' 같은 1인칭 역할극 호칭으로 글쓴이를 직접 지칭하지 마라. ㅋㅋㅋ, ㅎㅎㅎ, 억지 밈, '너'·'야', 과한 느낌표 남발 금지."
    - "**[T3] 쿠팡 제휴 링크 마커:** 구체적 실물 상품이 독자에게 실질적 도움이 되는 맥락에서만 자연스럽게 언급 시, 설명 직후 새 줄에 {{coupangLink:상품명}} 1회. 정책·금융·추상 개념이거나 억지 삽입이면 절대 넣지 말 것. shoppableKeyword가 비어 있어도 맥락상 자연스러우면 넣을 수 있다. 포스팅당 최대 1회."
    - "**[T3] E-E-A-T 입체감 부여:** 장점만 나열하는 기계적인 글을 피하기 위해 아래 현실 제약 조건 중 하나를 본문 중반에 배치하라.\n        조건 A (타겟 배제): 해당 정보·혜택이 무용지물이 되는 특정 타겟층의 물리적·경제적 조건\n        조건 B (기회비용): 혜택을 얻기 위해 감수해야 하는 인지적·시간적 수고스러움\n        조건 C (병목 구간): 대중이 가장 흔하게 범하는 논리적 오류나 막히기 쉬운 한계점\n        [Escape Hatch]: 입력 데이터나 주제 성격상 억지스럽거나 인과관계가 부족하면 이 단계를 완전히 생략하라. 억지로 지어내느니 깔끔한 팩트 전달이 SEO에 훨씬 유리하다."
    - "**[T3] 결론부 레이아웃 유동성:** 요약 박스로 끝내려는 강박 금지. 때로는 묵직한 한두 문장·재치 있는 질문으로 맺는 등 유동적으로 변주하라."
    - "**[T3] GEO 변수 노출 절대 금지:** {{coreEntities}}, {{targetAudience}} 같은 변수명·중괄호는 본문에 출력 금지. 엔티티의 실제 단어만 녹여내라."
    - |
      "**시각적 요소 삽입 (이미지 / Mermaid / Markmap):**
            {{contentDepth}}에 따라 아래 **시각적 슬롯 수**를 엄수하세요 (슬롯 1개 = 이미지 1곳 **또는** 해당 위치의 Mermaid/Markmap 코드 블록 1개):
            - **Snack**     : **1개** — `IMAGE_PLACEHOLDER_1`만 사용. 도입부·첫 본문 구간 근처 한 곳에 배치. (기획 JSON에 `Bite-sized`로 올 수 있으면 Snack과 **동일** 취급)
            - **Normal**    : **2개** — `IMAGE_PLACEHOLDER_1`, `IMAGE_PLACEHOLDER_2`
            - **Deep-Dive** : **3개** — `IMAGE_PLACEHOLDER_1`, `IMAGE_PLACEHOLDER_2`, `IMAGE_PLACEHOLDER_3`
            슬롯 수를 초과해 시각 요소를 넣지 마세요. (짧은 글에 3슬롯을 억지로 채우면 본문 대비 도식·이미지 비율만 커져 저정보 페이지로 보일 수 있음.)

            각 슬롯은 해당 구간의 내용 성격을 보고 아래 기준으로 **독립적으로** 판단하세요.

            [① Mermaid 또는 Markmap을 우선 선택하는 경우]
            해당 구간 내용이 아래 중 하나에 해당하면 다이어그램이 이미지보다 효과적입니다:
            - 단계·절차·순서가 있는 흐름 (신청 과정, 설정 순서, 처리 단계)
            - A vs B 비교 또는 조건 분기
            - 상태 변화 흐름 (신청→검토→승인→지급)
            - 일정·기한·연혁이 시간 순으로 나열
            - 글 전체 구조를 목차로 요약하면 독자에게 도움이 되는 경우
            - 실제 수치가 존재하는 비율·구성 비교

            → 해당하면 아래 중 내용에 가장 맞는 타입을 골라 **코드 블록으로 직접** 작성:
            · flowchart LR    : 의사결정 분기, 조건 선택, 신청 절차
            · timeline        : 일정·연혁·시간 흐름
            · pie             : 비율·구성 (**실제 수치가 있을 때만**)
            · journey         : 사용자 경험 단계
            · sequenceDiagram : 왕복 흐름, 단계 간 상호작용
            · stateDiagram-v2 : 상태 변화
            · gantt           : 준비 일정표, 기간별 단계
            · Markmap         : 글 전체 개념 조망·목차 요약 (코드 블록 언어 지정자: markmap)

            → Mermaid/Markmap을 쓴 슬롯은 **해당 슬롯에서** `IMAGE_PLACEHOLDER_N`을 쓰지 않습니다(코드 블록이 그 슬롯을 대체). `IMAGE_PLACEHOLDER_N` 표기는 **이미지**로 채울 슬롯에만 사용하세요.

            [② 이미지를 선택하는 경우]
            위 ①에 해당하지 않거나, 분위기·감성·무드가 중요한 구간, 다이어그램이 딱딱해지는 구간에는 이미지:
            → ![alt](IMAGE_PLACEHOLDER_N "english keyword") (허용된 슬롯 번호 N만 사용)
            → alt는 상황 묘사·명사형·동사형 중 2가지 이상 혼용, 영문 keyword 필수

            [공통 금지]
            - Mermaid style, classDef 등 복잡한 스타일링 문법 사용 금지
            - 수치 없는 pie 차트에 임의 수치 삽입 금지 (T1 수치 창작 금지와 동일)
            - Mermaid mindmap 타입 사용 금지 (렌더링 불안정)
            - 억지로 다이어그램 끼우기 금지. 이미지가 더 자연스러우면 이미지가 정답
    - |
      **[Hugo Shortcode 정보 박스]:** 독자에게 반드시 전달해야 하는 핵심 정보가 있을 때,
      일반 문단 대신 아래 숏코드로 감싸 시각적으로 돋보이게 하세요. 글 전체에서 최대 1~2회,
      자연스러운 맥락에서만 사용하세요. 억지로 끼워 넣지 마세요.
      - {{< tip >}}절약 포인트나 핵심 팁{{< /tip >}}
      - {{< warning >}}놓치기 쉬운 주의사항이나 조건{{< /warning >}}
      - {{< info >}}보충 설명이나 관련 정책 안내{{< /info >}}

  # =========================================================================
  # analysis 공통 SEO 규칙  (trend_analysis / manual_analysis 동시 참조)
  # =========================================================================
  analysis_seo_rules:
    pain_score: |
      ■ Pain Score 연산 (painScore, 정수 3~15)
        - 심각성(severity) 1~5: 이 문제가 터지면 독자의 삶이 얼마나 망가지나?
        - 시급성(urgency) 1~5: 지금 당장 찾아야 하는 문제인가, 여유 있는 문제인가?
        - 타격(impact) 1~5: 금전·시간·안전·관계 등 실질 피해 크기
        - 세 점수를 합산한 **정수 하나**를 painScore로 출력. (범위 3~15)
        - 해석 기준: 9점 이상 = 긴급·손실 방지형 메인 기획 / 6~8점 = 비교·고민 단계 보조 기획 / 5점 이하 = 기획안을 다시 날카롭게 다듬어 출력
    serp_differentiation: |
      ■ SERP Differentiation (serpDifferentiation) — 2단계 사고 과정 필수
        [1단계] 해당 mainKeyword 검색 상위 글들이 공통으로 담고 있을 내용을 추론한다.
        → 이 내용들은 우리 글에서 생략하거나 도입부 1~2문장으로 처리한다.
        [2단계] 기존 글을 읽은 독자가 30분 후 검색창에 다시 칠 질문이 무엇인지 추론한다.
        → 이것이 우리 글의 핵심 H2 섹션 주제가 되어야 한다.
        출력 형식 (반드시 이 형식으로):
        "기존 글들은 [X]만 다룬다. 이 글은 독자가 그 다음으로 찾을 [Y]에 집중한다."
        나쁜 예: "기존 글보다 더 친절하고 상세하게 설명한다."
    search_behavior: |
      ■ Search Behavior Queries (searchBehaviorQueries)
        - 독자가 실제 검색창에 타이핑할 구어체 문장 2~3개 (각 최대 15단어 이내)
        - 자가 검증: "이 문장이 네이버 지식인·레딧·커뮤니티에 실제로 올라올 법한가?" 아니라면 폐기
      ■ Query Confidence (queryConfidence, enum)
        - High / Medium / Low 중 하나
        - Low면 기획안을 처음부터 재도출
    info_gain: |
      ■ Information Gain 앵글 의무화
        기획안의 angleType과 별개로, 아래 3종 중 하나를 infoGainAngle로 반드시 선택:
        [A] 숨겨진 부작용 / 2차 파급 효과 (hidden_risk)
        [B] 의외의 사실 / 통념 반박 (counter_intuitive)
        [C] 과거 유사 사건 비교 분석 (historical_comparison)
        단순 사실 전달이나 뻔한 원인 분석은 infoGainAngle이 될 수 없다.

tasks:
  # ===================================================================== #
  keyword_extraction:
    persona: "트렌드 원문에서 핵심 검색어만 정교하게 추출하는 데이터 분석가"
    instruction: |
      입력된 트렌드 데이터를 분석하여, 네이버에서 실제 검색량과 문서 수를 조회하기에 가장 적합한 명사형 키워드 8~10개를 추출하세요.
      - 키워드는 반드시 한국어로 추출하세요.
      - 키워드는 검색 도구에 입력하기 적합하도록 구체적인 명사/복합명사 형태여야 합니다 (예: "아이폰"보다는 "아이폰 발열 해결").
      - 출력은 반드시 JSON 문자열 배열 형식이어야 합니다. 마크다운 코드 블록을 사용하지 마세요.
    template: |
      [Input Trend Data]
      {{trends_data}}

      추출된 키워드 배열 (JSON Array of Strings):

  # ===================================================================== #
  #                       기획 단계 (Planning Phase)                           #
  # ===================================================================== #

  trend_analysis:
    persona: "트렌드의 본질을 꿰뚫어 보고, 그 트렌드를 독자에게 전달할 가장 완벽한 '화법'을 스스로 결정하는 전략적 콘텐츠 디렉터"
    instruction: |
      제공된 JSON 데이터를 분석하여, 친한 지인에게 카톡으로 알려주듯 실생활에 밀착된 {{topic_count}}개의 블로그 기획안을 작성하세요.
      당신은 이 블로그의 과거 발행 이력을 전혀 알지 못하는 상태로 매 요청을 새로 받습니다. 그러므로 이전에 통했던 패턴, 표현, 제목 형태를 임의로 가정해 재사용하지 말고, 오직 아래 [입력 데이터]만 근거로 매번 새롭게 기획하세요.

      [사전 팩트 검증]
      제공된 입력 데이터만으로 정책의 지원 한도, 할인 조건, 상품의 대략적인 가격대 등 구체적인 맥락 파악이 불가능하여 논리적인 기획이 어렵다면, 내부 검색 기능을 활용해 핵심 팩트를 먼저 파악한 후 기획안을 도출하세요.

      [기획안 도출 포트폴리오 규칙 (데이터 Key값 타겟팅)]
      1. 기획안 1 (에버그린 우선): "fss", "policy", "ppomppu", "gNewsBiz", "gNewsLabor", "aha" 소스를 최우선 분석하세요. 이 소스들이 빈약할 때만 "signal" 진입 허용.
      2. 기획안 2 (에버그린 우선): 사기 예방, 지원금, 실생활 꿀팁 등 에버그린 주제를 발굴하세요.
      3. 기획안 3 (창의적 융합형): 에버그린 소스 2개 융합을 1순위로 시도하세요. "signal" 기반 단독 기획은 가급적 피하고 에버그린을 융합하세요.
      4. 데이터 부족 대응(중요): 위에서 지정한 Key의 배열이 비어 있거나 너무 빈약하면, 의도가 가장 가까운 다른 Key로 대체하세요. (이슈군 보강 순서: signal → gNewsBiz → gNewsLabor → aha, 정보군 보강 순서: fss → policy → ppomppu) 그래도 재료가 부족하면 기획안 수를 {{topic_count}}개보다 줄이는 한이 있어도, 입력 데이터에 근거 없는 주제를 임의로 만들어내지 마세요.
      5. 카니발리제이션 방지(매우 중요): 프롬프트 최하단에 제공된 '[최근 30일 발행 이력]' 목록을 반드시 확인하고, 이전에 이미 발행된 핵심 키워드나 완전히 동일한 주제(메시지)를 다루는 기획안은 절대 생성하지 마세요. 완전히 새로운 시각과 앵글을 발굴해야 합니다.

      [키워드 및 주제 선정 필수 규칙 (트렌드 기생형 전략)]
      1. 경쟁지수(Data) 기반 키워드 이원화 전략:
         - {{metrics_data}}를 확인하세요. 해당 키워드의 '경쟁지수(competitionIndex)'가 0.5 미만인 확실한 블루오션이라면 '원형 키워드'를 mainKeyword로 유지해도 좋습니다.
         - 그러나 경쟁지수가 0.5 이상이거나 치열한 레드오션이라면, 신생 블로그 생존을 위해 반드시 타겟의 아주 좁고 구체적인 상황을 가정한 '행동 파생 키워드(롱테일, 예: 18세 자녀 국민연금 대납 증여세)'로 변환하여 mainKeyword로 설정하세요. 데이터 없이 큰 키워드로 정면 승부하는 것은 금지합니다.
      2. 앵글(Angle) 동적 할당: 각 기획의 성격에 맞춰 'expose'(폭로/리스크), 'guide'(절차/방법), 'compare'(비교/선택) 중 가장 어울리는 것을 영문 소문자로 하나만 선택하세요.
      3. 데이터/팩트 중심(coreFact): 선택한 앵글을 뒷받침할 팩트는 **숫자·고유명사·기관명·날짜 중 최소 1개를 반드시 명시적으로 포함**해야 합니다. "많이", "상당한", "최근에" 같은 추상 형용사만으로는 불가. 입력 데이터에 없는 수치·통계·가격은 절대 만들어내지 마세요. 수치가 적은 출처(예: signal/aha)라면 출처명, 발생 시점, 순위(rank), 질문 맥락, 인용된 언론사명을 팩트로 활용하세요.
      4. 검색 기능 활용 (팩트 정찰): 제공된 입력 데이터만으로 맥락 파악이 어렵거나 구체적인 수치/날짜가 부족한 경우, 내부 검색 기능을 활용하여 최신 팩트를 확인하세요. **이때 단순히 사건의 표면적인 키워드만 보지 말고, 해당 이슈에 대한 대중의 실제 여론(장난스러운 반응인지, 실제 분노인지)을 파악하여 기획에 반영하세요.** 파악된 구체적인 배경 정보는 coreFact에 녹여내세요. (중요: 단, 결과물 어디에도 '[Google Search]' 와 같이 검색 도구를 사용했다는 텍스트 흔적을 절대 남기지 마세요.)

      [🔥 신생 블로그 SEO 보강 규칙 — 필수]
      <<analysis_seo_rules.pain_score>>
      <<analysis_seo_rules.serp_differentiation>>
      <<analysis_seo_rules.search_behavior>>
      <<analysis_seo_rules.info_gain>>

      [viralTitles 작성 규칙 — 심리 트리거 기반 클릭 훅 설계]
      아래 3가지 뼈대(curiosity / dataDriven / solution)에 반드시 **각기 다른 심리 트리거**를 장착하세요. A+B=C 식 뻔한 단어 조립을 버리고, 커뮤니티 베스트 게시물처럼 날것의 어휘와 입체적 위트로 '클릭을 참을 수 없는 제목'을 도출하세요. (공백 포함 25자 이내)

      [활용 가능한 심리 트리거 무기고 (6종)]
      - FOMO(기회 상실 공포): 시간·자격 제약을 찔러 "지금 놓치면 끝"이라는 압박 유발 (예: "이번 주 안 신청하면 내년 기약")
      - 손실 회피(호구 방어): "모르면 나만 손해"라는 감각 자극 (예: "호구 안 당하는 법", "몰라서 못 받은 50만원")
      - 호기심 갭(정보 격차): 결론을 숨기고 열어둬 클릭 유발 (예: "아무도 안 알려준 ~", "설마 했는데 진짜였다")
      - 사회적 증명(내집단 소속감): 특정 그룹이 이미 누리는 혜택 강조 (예: "월천 직장인만 챙기는", "아는 사람은 다 쓴다")
      - 구체성(숫자 박기): 모호한 형용사 대신 정확한 수치·기한으로 신뢰도 폭파 (예: "89,000원 아끼는 7분 루틴")
      - 반전(상식 파괴): 통념을 뒤엎는 역발상으로 주의 환기 (예: "알고 보면 정반대", "오히려 손해였다")

      [viralTitles 필수 규약]
      1. 3개 제목은 **서로 다른 트리거**를 사용할 것. 같은 트리거 중복 금지.
      2. 3개 중 **최소 1개는 searchIntent에 담긴 감정·불안·니즈를 정면으로 관통**해야 함.
      3. 아래 뼈대를 참고하되 기계적으로 따르지 말고 주제 성격에 맞게 유동적으로 변주하세요.
         - curiosity: [메인키워드] + [대중이 무심코 놓치고 있는 소름 돋는 리스크나 반전 팩트]
         - dataDriven: [메인키워드] + [입력 데이터의 구체적 수치/순위] + [안 보면 나만 손해 보는 명확한 이득]
         - solution: [타겟 독자의 뼈를 때리는 구체적 페인포인트] + [해결책의 사이다 암시]

      [최종 출력 전 자가 점검 체크리스트 (모든 blogPost 항목에 적용)]
      아래 6개 항목을 스스로 검토해 기준 미달이면 해당 필드를 수정한 뒤 출력하세요. **체크리스트 자체는 응답 JSON에 포함하지 마세요.**
      ✓ 제공된 [실시간 네이버 검색 데이터]의 수치를 정확히 반영했는가?
      ✓ 경쟁 지수가 낮은 블루오션 키워드를 우선 선정했는가?
      ✓ viralTitles 3개가 서로 다른 심리 트리거를 사용하는가?
      ✓ coreFact에 숫자·고유명사·기관명·날짜 중 최소 1개가 명시적으로 포함되는가?
      ✓ viralTitles·metaDescription의 어휘가 targetAudience가 실제로 구사할 톤과 일치하는가?
      ✓ 3개 제목 중 최소 1개가 searchIntent의 감정·불안·니즈를 정면으로 관통하는가?
      ✓ painScore 합산이 논리적으로 타당하고, 6점 미만이면 기획을 다시 가다듬었는가?
      ✓ serpDifferentiation 이 "더 자세히 설명" 같은 모호한 차별화가 아니라 구체적 누락 주제를 가리키는가?
    template: |
      [실시간 트렌드 데이터]
      {{trends_data}}

      {{metrics_data}}

      ※ metrics_data 내 "연관검색어(참고)"는 주제 선정의 절대 기준이 아니라 독자 언어/검색 맥락을 파악하기 위한 보조 힌트입니다. 노이즈가 섞일 수 있으므로 painScore·queryConfidence 판단과 함께 선별적으로 활용하세요.

      위 데이터를 바탕으로 아래 JSON 구조로 응답하세요 (기획안 개수: {{topic_count}}개):
      {
        "blogPosts": [
          {
            "trafficStrategy": {
              "lifecycle": "Burst 또는 Evergreen (enum 값만)",
              "targetAudience": "이 글을 클릭할 구체적인 타겟 페르소나 한 줄 (예: 매달 통신비가 아까운 30대 직장인)"
