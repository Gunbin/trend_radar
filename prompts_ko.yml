      - "이미지 절대 형식 준수: 제공된 이미지 플레이스홀더({{context_url_1}}, {{context_url_2}}, {{context_url_3}})는 반드시 ![이미지 설명](IMAGE_PLACEHOLDER_N \"english keyword\") 형식으로 본문 문맥에 맞는 위치에 삽입하세요. (N은 1, 2, 3) **플레이스홀더 문자열을 마크다운 없이 그대로 노출하거나 영문 keyword를 빠뜨리는 것은 치명적 오류입니다.**"
      - "H2 소제목: 제공된 {{subTopics}}를 활용하여 행동 중심 문장으로 구성하세요."
