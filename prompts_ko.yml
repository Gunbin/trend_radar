    format_rules: "반드시 순수한 JSON 형식으로만 답변하세요. 응답의 시작과 끝에 ```json 이나 ``` 같은 마크다운 코드 블록을 절대 포함하지 마세요. 오직 '{' 로 시작해서 '}' 로 끝나는 텍스트만 출력해야 합니다. **또한, JSON의 Value 값 내부에 큰따옴표(\")를 사용할 경우 반드시 역슬래시(\\)를 사용해 이스케이프 처리하거나, 작은따옴표(')로 대체하여 JSON 파싱 에러가 발생하지 않도록 엄격히 작성하세요.**"
